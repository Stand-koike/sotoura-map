/** JST の暦・年月日（数値） */
function getJstYmdParts(d) {
    const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Tokyo',
        year:     'numeric',
        month:    '2-digit',
        day:      '2-digit'
    }).formatToParts(d);
    const o = {};
    for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        if (p.type === 'year' || p.type === 'month' || p.type === 'day') o[p.type] = +p.value;
    }
    return { y: o.year, m: o.month, d: o.day };
}

/** JST のその暦日 12:00 に対応する UTC の Date（SunCalc.getTimes 用） */
function jstCalendarNoonUtcDate(y, m, day) {
    return new Date(Date.UTC(y, m - 1, day, 3, 0, 0));
}

/**
 * イラスト切替フェーズ（CONFIG.MAP_IMAGE + SunCalc）
 * day | sunset | night
 */
function getIllustrationPhase(now, cfg) {
    if (typeof SunCalc === 'undefined' || !cfg) return 'day';
    const lat = cfg.solarLat != null ? Number(cfg.solarLat) : cfg.center[1];
    const lng = cfg.solarLng != null ? Number(cfg.solarLng) : cfg.center[0];
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return 'day';

    let tt;
    try {
        const { y, m, d } = getJstYmdParts(now);
        tt = SunCalc.getTimes(jstCalendarNoonUtcDate(y, m, d), lat, lng);
    } catch (e) {
        return 'day';
    }

    if (!tt?.sunset || !tt?.dawn) return 'day';

    const preMin = Number(cfg.sunsetPreheatMinutes);
    const preMs = (Number.isFinite(preMin) ? preMin : 45) * 60000;
    const sunsetStart = tt.sunset.getTime() - preMs;

    const duskKey = cfg.duskBand === 'civil' ? 'dusk' : 'nauticalDusk';
    const tEveningEnd = tt[duskKey];
    if (!(tEveningEnd instanceof Date) || isNaN(tEveningEnd.getTime())) return 'day';
    const eveningEnd = tEveningEnd.getTime();

    const dawn = tt.dawn.getTime();
    const tMs = now.getTime();
    if (tMs >= dawn && tMs < sunsetStart) return 'day';
    if (tMs >= sunsetStart && tMs < eveningEnd) return 'sunset';
    return 'night';
}

/** イラスト URL に cacheVersion を付与（blob: / data: はそのまま） */
function illustrationUrlWithCacheBust(url) {
    if (!url) return url;
    const s = String(url);
    if (s.indexOf('blob:') === 0 || s.indexOf('data:') === 0) return url;
    const cfg = CONFIG.MAP_IMAGE || {};
    const v = cfg.cacheVersion != null && cfg.cacheVersion !== ''
        ? String(cfg.cacheVersion)
        : String(Date.now());
    const sep = s.includes('?') ? '&' : '?';
    return `${s}${sep}v=${encodeURIComponent(v)}`;
}

/** file:// 用: 画像→canvas→blob URL（未完了時は timeoutMs 後に元 URL で返す） */
function illustrationImageToBlobUrl(url, timeoutMs) {
    const fetchUrl = illustrationUrlWithCacheBust(url);
    const limit = Number(timeoutMs);
    const ms = Number.isFinite(limit) && limit > 0 ? limit : 12000;
    return new Promise(resolve => {
        let settled = false;
        const finish = (v) => {
            if (settled) return;
            settled = true;
            clearTimeout(tid);
            resolve(v);
        };
        const tid = setTimeout(() => {
            console.warn('[MapModule] illustration blob 化タイムアウト — 元 URL を使用', url);
            finish(url);
        }, ms);
        const img = new Image();
        img.onload = () => {
            try {
                const c = document.createElement('canvas');
                c.width = img.naturalWidth;
                c.height = img.naturalHeight;
                c.getContext('2d').drawImage(img, 0, 0);
                c.toBlob(blob => finish(blob ? URL.createObjectURL(blob) : url));
            } catch (e) {
                finish(url);
            }
        };
        img.onerror = () => finish(url);
        img.src = fetchUrl;
    });
}

// ================================================================
// MapModule — マップ初期化・イラストマップ表示・GPS
//   イラスト昼夜夕: MAP_IMAGE + SunCalc。キャッシュは cacheVersion で bust
// ================================================================
const MapModule = {
    _map: null,

    _loaded: false,

    _illustrationTimer:           null,
    _illustrationVisibilityBound: null,

    init() {
        const token = CONFIG.MAPBOX_TOKEN || '';
        if (!token || token.includes('YOUR_')) {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'block';
                loading.innerHTML =
                    'Mapbox トークン未設定。<code>web/secrets.local.js</code> に <code>MAPBOX_TOKEN</code>（pk.*）を設定し、' +
                    '<code>web/</code> をドキュメントルートにして開いてください（例: <code>cd web &amp;&amp; python -m http.server 8080</code>）。';
            }
            console.error('[MapModule] MAPBOX_TOKEN が未設定です。secrets.example.js → secrets.local.js を参照。');
            return;
        }
        mapboxgl.accessToken = token;
        const { center, initZoom, minZoom, maxZoom, maxBounds, bearing = 0, pitch = 0 } = CONFIG.MAP_IMAGE;

        this._map = new mapboxgl.Map({
            container: 'map',
            /* 空スタイルは既定で黒背景 → イラスト外周に合わせた background レイヤーを最背面に置く */
            style: {
                version: 8,
                sources: {},
                layers:  [{
                    id:     'illustration-sky-bg',
                    type:   'background',
                    paint:  { 'background-color': '#A8D8E8' }
                }]
            },
            center:    center,
            zoom:      initZoom,
            minZoom:   minZoom,
            maxZoom:   maxZoom,
            maxBounds: maxBounds,
            bearing:   bearing,
            pitch:     pitch,
            antialias: true
        });
        State.map = this._map;

        const onMapReady = () => {
            if (this._loaded) return;
            this._loaded = true;

            try {
                LayerManager.init(this._map);
                import('./js/mikoshi-main-map.js')
                    .then((mod) => mod.attachToMainMap(this._map))
                    .catch((e) => console.warn('[Mikoshi]', e));
            } catch (e) {
                console.error('[MapModule] レイヤー初期化エラー:', e);
            }
            DataModule.fetch();
            DataModule.startPolling();
            this._startGPS();

            Promise.resolve(this._addIllustrationMap())
                .catch((e) => {
                    console.error('[MapModule] イラストレイヤ読込:', e);
                    return this._addIllustrationMapDayFallback();
                })
                .catch((e2) => console.error('[MapModule] イラスト昼フォールバック失敗:', e2));
        };

        this._map.on('load', onMapReady);

        this._map.on('error', (e) => {
            console.warn('[MapModule] マップエラー:', e.error?.message || e);
            if (!this._loaded) onMapReady();
        });

        setTimeout(() => {
            if (!this._loaded) {
                console.warn('[MapModule] load タイムアウト — 強制的にデータ取得を開始');
                onMapReady();
            }
        }, 8000);

        this._map.on('click', () => {
            UIModule.closePanelOverlay();
        });

        window.addEventListener('resize', () => {
            const pc = window.innerWidth >= 768;
            if (State.isPC !== pc) {
                State.isPC = pc;
                if (pc) document.body.classList.remove('cards-sheet-collapsed');
                setTimeout(() => {
                    this._map.resize();
                    if (State.allSpots.length > 0) this.fitBounds();
                }, 310);
            }
        });
    },

    /** イラスト用 source/layer（day/sunset/night）を取り除く */
    _removeIllustrationRasterStack() {
        if (!this._map) return;
        if (this._illustrationTimer) {
            clearInterval(this._illustrationTimer);
            this._illustrationTimer = null;
        }
        ['night', 'sunset', 'day'].forEach((key) => {
            const lid = `illustration-map-layer-${key}`;
            const sid = `illustration-map-${key}`;
            try {
                if (this._map.getLayer(lid)) this._map.removeLayer(lid);
                if (this._map.getSource(sid)) this._map.removeSource(sid);
            } catch (e) {
                console.warn('[MapModule] イラストレイヤ削除:', e);
            }
        });
    },

    /** イラスト image source のロード完了を待つ（再読込時の opacity レース回避） */
    _waitForIllustrationSources(keys, timeoutMs) {
        if (!this._map) return Promise.resolve();
        const limit = Number(timeoutMs);
        const ms = Number.isFinite(limit) && limit > 0 ? limit : 15000;
        return new Promise(resolve => {
            const pending = new Set(keys);
            let settled = false;
            const finish = () => {
                if (settled) return;
                settled = true;
                this._map.off('sourcedata', onSource);
                clearTimeout(tid);
                resolve();
            };
            const onSource = (e) => {
                if (!e.sourceId || !e.sourceId.startsWith('illustration-map-')) return;
                const key = e.sourceId.replace('illustration-map-', '');
                if (!pending.has(key)) return;
                try {
                    if (this._map.isSourceLoaded(e.sourceId)) pending.delete(key);
                } catch (err) {
                    console.warn('[MapModule] isSourceLoaded:', err);
                }
                if (pending.size === 0) finish();
            };
            keys.forEach(k => {
                const sid = `illustration-map-${k}`;
                try {
                    if (this._map.getSource(sid) && this._map.isSourceLoaded(sid)) pending.delete(k);
                } catch (err) { /* source 未追加 */ }
            });
            if (pending.size === 0) {
                resolve();
                return;
            }
            this._map.on('sourcedata', onSource);
            const tid = setTimeout(() => {
                if (pending.size > 0) {
                    console.warn('[MapModule] イラスト source 待ちタイムアウト', [...pending]);
                }
                finish();
            }, ms);
        });
    },

    /**
     * 3 枚スタック失敗時: 昼 1 枚のみ（日周り切替なし）
     * @returns {Promise<void>}
     */
    _addIllustrationMapDayFallback() {
        const cfg = CONFIG.MAP_IMAGE;
        const dayUrl = cfg.urlDay || cfg.url;
        const { coordinates, latOffset = 0, lngOffset = 0 } = cfg;
        const adjustedCoords = coordinates.map(([lng, lat]) => [lng + lngOffset, lat + latOffset]);

        this._removeIllustrationRasterStack();

        const insertDay = (finalUrl) => {
            if (this._map.getSource('illustration-map-day')) return Promise.resolve();
            this._map.addSource('illustration-map-day', {
                type:        'image',
                url:         finalUrl,
                coordinates: adjustedCoords
            });
            this._map.addLayer({
                id:      'illustration-map-layer-day',
                type:    'raster',
                source:  'illustration-map-day',
                paint:   { 'raster-opacity': 1, 'raster-fade-duration': 0 }
            });
            return this._waitForIllustrationSources(['day']);
        };

        if (location.protocol === 'file:') {
            return illustrationImageToBlobUrl(dayUrl).then((u) => insertDay(u));
        }
        return insertDay(illustrationUrlWithCacheBust(dayUrl));
    },

    /**
     * 昼・夕・夜の raster を積む。source ready 後にフェーズ切替を開始。
     * @returns {Promise<void>}
     */
    _addIllustrationMap() {
        const cfg = CONFIG.MAP_IMAGE;
        if (cfg.dayOnly || !cfg.urlSunset || !cfg.urlNight) {
            return this._addIllustrationMapDayFallback();
        }
        const dayUrl = cfg.urlDay || cfg.url;
        const sunsetUrl = cfg.urlSunset;
        const nightUrl = cfg.urlNight;
        const { coordinates, latOffset = 0, lngOffset = 0 } = cfg;
        const adjustedCoords = coordinates.map(([lng, lat]) => [lng + lngOffset, lat + latOffset]);

        this._removeIllustrationRasterStack();

        const phaseDefs = [
            { key: 'day', url: dayUrl },
            { key: 'sunset', url: sunsetUrl },
            { key: 'night', url: nightUrl }
        ];

        const insertStack = resolvedUrls =>
            new Promise((resolveIllust, rejectIllust) => {
                try {
                    const initialPhase = getIllustrationPhase(new Date(), cfg);
                    phaseDefs.forEach((p, i) => {
                        const rawUrl = Array.isArray(resolvedUrls) ? resolvedUrls[i] : p.url;
                        const finalUrl = Array.isArray(resolvedUrls)
                            ? rawUrl
                            : illustrationUrlWithCacheBust(rawUrl);
                        const opacity = p.key === initialPhase ? 1 : 0;
                        this._map.addSource(`illustration-map-${p.key}`, {
                            type:        'image',
                            url:         finalUrl,
                            coordinates: adjustedCoords
                        });
                        this._map.addLayer({
                            id:      `illustration-map-layer-${p.key}`,
                            type:    'raster',
                            source:  `illustration-map-${p.key}`,
                            paint:   { 'raster-opacity': opacity, 'raster-fade-duration': 0 }
                        });
                    });
                    this._waitForIllustrationSources(phaseDefs.map(p => p.key))
                        .then(() => {
                            this._scheduleIllustrationPhase();
                            resolveIllust();
                        })
                        .catch(rejectIllust);
                } catch (e) {
                    rejectIllust(e);
                }
            });

        if (location.protocol === 'file:') {
            return Promise.all(phaseDefs.map(p => illustrationImageToBlobUrl(p.url))).then(insertStack);
        }
        return insertStack(null);
    },

    _scheduleIllustrationPhase() {
        const apply = () => this._applyIllustrationTimePhase();
        apply();
        if (this._illustrationTimer) clearInterval(this._illustrationTimer);
        this._illustrationTimer = setInterval(apply, 45000);
        if (!this._illustrationVisibilityBound) {
            this._illustrationVisibilityBound = () => {
                if (document.visibilityState === 'visible') apply();
            };
            document.addEventListener('visibilitychange', this._illustrationVisibilityBound);
        }
    },

    _applyIllustrationTimePhase() {
        if (!this._map) return;
        const keys = ['day', 'sunset', 'night'];
        if (!keys.every(k => this._map.getLayer(`illustration-map-layer-${k}`))) return;
        if (!keys.every(k => {
            const sid = `illustration-map-${k}`;
            return this._map.getSource(sid) && this._map.isSourceLoaded(sid);
        })) return;
        const phase = getIllustrationPhase(new Date(), CONFIG.MAP_IMAGE);
        for (const key of keys) {
            this._map.setPaintProperty(`illustration-map-layer-${key}`, 'raster-opacity', key === phase ? 1 : 0);
        }
    },

    fitBounds() {
        const spotsVisible = LayerManager.getDefs().spots.visible;
        const targets = spotsVisible
            ? State.allSpots.filter(s => App._selectedCategories.has(App._effectiveFilterCategorySpot(s)))
            : [];

        if (targets.length > 0) {
            const bounds = new mapboxgl.LngLatBounds();
            targets.forEach(s => bounds.extend(s.coords));
            const padding = State.isPC
                ? { top: 80,  bottom: 80,  left: 50, right: 50 }
                : { top: 80, bottom: 260, left: 30, right: 30 };
            this._map.fitBounds(bounds, { padding, duration: 800 });
        } else {
            const [[w, n], , [e, s]] = CONFIG.MAP_IMAGE.coordinates;
            const pad = State.isPC ? 30 : { top: 60, bottom: 240, left: 20, right: 20 };
            this._map.fitBounds([[w, s], [e, n]], { padding: pad, duration: 800 });
        }
    },

    flyTo(spot) {
        const c = spot?.coords;
        if (!Array.isArray(c) || c.length < 2
            || !Number.isFinite(Number(c[0])) || !Number.isFinite(Number(c[1]))) {
            console.warn('[MapModule] flyTo: skip (invalid coords)', spot?.id);
            return;
        }
        const padding = State.isPC
            ? { top: 50, bottom: 50, left: 50, right: 50 }
            : { top: 50, bottom: 240, left: 20, right: 20 };
        this._map.flyTo({ center: spot.coords, zoom: 17, speed: 0.8, padding, essential: true });
    },

    flyToUser() {
        if (State.userLocationMarker) {
            this._map.flyTo({ center: State.userLocationMarker.getLngLat(), zoom: 17 });
        }
    },

    _startGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition(
            pos => {
                const coords = [pos.coords.longitude, pos.coords.latitude];
                if (!State.userLocationMarker) {
                    const el = document.createElement('div');
                    el.className = 'my-location-marker';
                    el.innerHTML = '<i class="fas fa-map-marker-alt"></i>';
                    State.userLocationMarker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
                        .setLngLat(coords).addTo(this._map);
                } else {
                    State.userLocationMarker.setLngLat(coords);
                }
            },
            err => console.log('[GPS]', err.message),
            { enableHighAccuracy: true }
        );
    }
};

            this._setActiveTab('tab-lang');

        if (!isOpen) {
            target.classList.add('open');
            if (!State.isPC && overlay) overlay.classList.add('open');
        } else {
            if (overlay) overlay.classList.remove('open');
            if (!State.isPC) this._setActiveTab('tab-home');

        document.querySelectorAll('.ctrl-panel').forEach(p => p.classList.remove('open'));

        }
        setTimeout(() => { if (MapModule._map) MapModule._map.resize(); }, 380);
    },

    expandCardsSheetIfCollapsed() {
        if (State.isPC) return;
        if (!document.body.classList.contains('cards-sheet-collapsed')) return;
        document.body.classList.remove('cards-sheet-collapsed');
        const btn = document.getElementById('card-panel-handle');
        if (btn) {
            btn.setAttribute('aria-expanded', 'true');
            btn.setAttribute('aria-label', '店舗カードを隠す');
        }
        setTimeout(() => { if (MapModule._map) MapModule._map.resize(); }, 380);
    },

    // ---- マーカー ----

    updateMarkers(spots) {
        State.activeMarkers.forEach(m => m.remove());
        State.liveMarkers.forEach(m => m.remove());
        State.scheduleMarkers.forEach(m => m.remove());
        State.activeMarkers = [];
        State.liveMarkers = [];
        State.scheduleMarkers = [];

        const spotsVisible = LayerManager.getDefs().spots.visible;

        spots.forEach(spot => {
            const si = getStatusInfo(spot.status);
            const el = document.createElement('div');
            el.className = 'custom-marker';
            el.id = `marker-${spot.id}`;
            if (!spotsVisible) el.style.display = 'none';

            const inner = document.createElement('div');
            inner.className = 'marker-inner floating';
            inner.style.borderColor = si.color;

            const clip = document.createElement('div');
            clip.className = 'marker-clip';

            const emoji = document.createElement('span');
            emoji.className = 'marker-emoji';
            emoji.innerText = spot.emoji;
            clip.appendChild(emoji);

            if (spot.imageUrl) {
                const img = new Image();
                img.src = spot.imageUrl;
                img.className = 'marker-image';
                img.style.display = 'none';
                img.onload = () => { img.style.display = 'block'; emoji.style.display = 'none'; };
                clip.appendChild(img);
            }
            inner.appendChild(clip);

            if (spot.status) {
                const badge = document.createElement('div');
                badge.className = 'status-badge';
                badge.style.cssText = `background:${si.color}; display:block;`;
                inner.appendChild(badge);
            }
            if (spot.livePost) {
                inner.style.borderColor = LIVE_RING_COLOR_STORE;
                inner.style.boxShadow = '0 4px 10px rgba(33,150,243,0.4)';
                inner.classList.remove('floating');
                const pin = document.createElement('div');
                pin.className = 'marker-pin marker-pin--floating';
                const stem = document.createElement('div');
                stem.className = 'marker-pin-stem';
                stem.style.setProperty('--stem-color', LIVE_RING_COLOR_STORE);
                pin.appendChild(inner);
                pin.appendChild(stem);
                const liveBadge = document.createElement('div');
                liveBadge.className = 'marker-live-badge';
                liveBadge.textContent = 'LIVE';
                el.classList.add('custom-marker--live-pin');
                el.appendChild(liveBadge);
                el.appendChild(pin);
            } else {
                inner.classList.add('floating');
                if (val(spot, 'news')) {
                    const nb = document.createElement('div');
                    nb.className = 'marker-news-badge';
                    nb.innerHTML = '<i class="fas fa-bullhorn"></i>';
                    el.appendChild(nb);
                }
                el.appendChild(inner);
            }
            el.addEventListener('click', e => { e.stopPropagation(); App.selectSpot(spot); });

            const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
                .setLngLat(spot.coords).addTo(MapModule._map);
            State.activeMarkers.push(marker);
        });

        /* 運営スポット / GPS の独立ピン */
        (State.liveStandalonePosts || []).forEach(lp => {
            if (!spotsVisible || lp.lat == null || lp.lng == null) return;
            if (!App._standaloneLiveVisible(lp)) return;
            const clr = LIVE_MARKER_COLOR_BY_ROLE[lp.role] || '#666';

            const el = document.createElement('div');
            el.className = 'live-standalone-marker custom-marker custom-marker--live-pin';
            const wrap = document.createElement('div');
            wrap.className = 'marker-inner-livepost';
            wrap.style.borderColor = clr;
            wrap.style.borderStyle = 'solid';

            if (lp.imageUrl) {
                const img = document.createElement('img');
                img.src = lp.imageUrl;
                img.alt = '';
                img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
                img.onerror = () => {
                    wrap.innerHTML = '<span style="font-size:20px;">📍</span>';
                };
                wrap.appendChild(img);
            } else {
                wrap.innerHTML = '<span style="font-size:22px;">📍</span>';
            }

            const pin = document.createElement('div');
            pin.className = 'marker-pin marker-pin--floating';

            const stem = document.createElement('div');
            stem.className = 'marker-pin-stem';
            stem.style.setProperty('--stem-color', clr);

            pin.appendChild(wrap);
            pin.appendChild(stem);

            const badge = document.createElement('div');
            badge.className = 'marker-live-badge';
            badge.style.background = clr;
            badge.textContent = 'LIVE';

            el.appendChild(badge);
            el.appendChild(pin);

            const msgShort = lp.message ? escapeHtml(lp.message.substring(0, 80)) : '';
            const imgHtml = lp.imageUrl
                ? `<img src="${escapeHtml(lp.imageUrl)}" alt="" style="max-width:220px;border-radius:8px;margin-top:6px"/>`
                : '';
            const popupHtml = `<div style="max-width:240px;font-size:13px;line-height:1.4">
                <div style="font-weight:bold;color:${clr}">${escapeHtml(lp.category || '')} · ${liveRoleJa(lp.role)}</div>
                <div style="font-size:11px;color:#888;margin-top:2px">${timeAgo(lp.timestamp)}</div>
                ${msgShort ? `<div style="margin-top:6px">${msgShort}</div>` : ''}
                ${imgHtml}
            </div>`;

            const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
                .setLngLat([Number(lp.lng), Number(lp.lat)])
                .setPopup(new mapboxgl.Popup({ offset: 28 }).setHTML(popupHtml))
                .addTo(MapModule._map);

            State.liveMarkers.push(marker);
        });

        /* 祭スケジュール ピン（レイヤーOFFでも DOM は生成し display で切替／toggle と整合） */
        const eventsVisible = LayerManager.getDefs().events?.visible;
        const nowEv = Date.now();
        EventScheduleModule.visible(nowEv).forEach(ev => {
                const isUpcoming = nowEv < ev.startAt.getTime();
                const accentColor = '#F57C00';

                const el = document.createElement('div');
                el.className = 'custom-marker';
                el.id = `ev-marker-${ev.id}`;
                if (!eventsVisible) el.style.display = 'none';

                const inner = document.createElement('div');
                inner.className = 'marker-inner floating';
                inner.style.borderColor = accentColor;

                const clip = document.createElement('div');
                clip.className = 'marker-clip';

                if (ev.imageUrl) {
                    const imgPin = document.createElement('img');
                    imgPin.className = 'marker-image';
                    imgPin.alt = '';
                    imgPin.referrerPolicy = 'no-referrer';
                    imgPin.src = ev.imageUrl;
                    imgPin.onerror = function () {
                        try { this.remove(); } catch (ex) {}
                    };
                    clip.appendChild(imgPin);
                }

                const emoji = document.createElement('span');
                emoji.className = 'marker-emoji';
                emoji.innerText = ev.emoji;
                clip.appendChild(emoji);
                inner.appendChild(clip);

                if (isUpcoming) {
                    const badge = document.createElement('div');
                    badge.className = 'marker-news-badge';
                    badge.style.background = accentColor;
                    badge.innerHTML = '<i class="fas fa-clock"></i>';
                    el.appendChild(badge);
                }

                el.appendChild(inner);

                const title  = State.language === 'ja' ? ev.title : ev.titleEn;
                const startFmt = ev.startAt.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                const endFmt   = ev.endAt.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                const statusText = isUpcoming
                    ? `<span style="color:${accentColor};font-weight:bold;">まもなく開始</span>`
                    : `<span style="color:#2E7D32;font-weight:bold;">開催中</span>`;
                const imgHtml = ev.imageUrl
                    ? `<div style="margin-top:8px"><img src="${escapeHtml(ev.imageUrl)}" alt="" referrerpolicy="no-referrer" style="max-width:100%;width:100%;max-height:200px;object-fit:cover;border-radius:8px;display:block" onerror="this.style.display='none'"/></div>`
                    : '';
                const popupHtml = `<div style="max-width:240px;font-size:13px;line-height:1.5">
                    <div style="font-size:20px;text-align:center;margin-bottom:4px">${ev.emoji}</div>
                    ${imgHtml}
                    <div style="font-weight:bold;font-size:14px">${escapeHtml(title)}</div>
                    <div style="font-size:11px;color:#666;margin-top:2px">${startFmt} – ${endFmt}</div>
                    <div style="margin-top:4px">${statusText}</div>
                </div>`;

                const schedMarker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
                    .setLngLat(ev.coords)
                    .setPopup(new mapboxgl.Popup({ offset: 28 }).setHTML(popupHtml))
                    .addTo(MapModule._map);

                State.scheduleMarkers.push(schedMarker);
            });
    },

    // ---- カードパネル ----

    renderCards(spots) {
        const container = document.getElementById('slide-panel');
        container.innerHTML = '';
        if (spots.length === 0) {
            container.innerHTML = `<div style="padding:20px; color:#555;">${t('noData')}</div>`;
            return;
        }
        spots.forEach(spot => {
            const card = document.createElement('div');
            card.className = 'slide-card';
            card.id = `card-${spot.id}`;
            card.onclick = () => App.selectSpot(spot);

            const si = getStatusInfo(spot.status);
            const newsVal = val(spot, 'news');
            const hoursText = val(spot, 'hours');

            const thumbHtml = spot.imageUrl
                ? `<img src="${spot.imageUrl}" class="card-thumb"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                : '';
            const placeholder = `<div class="card-emoji-placeholder"
                style="${spot.imageUrl ? 'display:none' : ''}">${spot.emoji}</div>`;

            const indParts = [];
            if (spot.status) {
                indParts.push(`<span class="card-ind card-ind--status" style="background:${si.bg};box-shadow:0 0 0 2px rgba(255,255,255,0.95)" title="${escapeHtml(spot.status)}" role="img" aria-label="${escapeHtml(spot.status)}"></span>`);
            }
            if (newsVal) {
                indParts.push(`<span class="card-ind card-ind--news" title="${escapeHtml(newsVal)}" aria-label="お知らせ"><i class="fas fa-bullhorn" aria-hidden="true"></i></span>`);
            }
            if (hoursText) {
                indParts.push(`<span class="card-ind card-ind--hours" title="${escapeHtml(hoursText)}" aria-label="営業時間"><i class="fas fa-clock" aria-hidden="true"></i></span>`);
            }
            if (spot.livePost) {
                indParts.push(`<span class="card-ind card-ind--live-tag" title="LIVE投稿"><span class="live-badge live-badge--card-top">LIVE</span></span>`);
            }
            const indicatorsHtml = indParts.length
                ? `<div class="card-image-indicators">${indParts.join('')}</div>`
                : '';

            const detailLines = [];
            if (spot.status) {
                detailLines.push(`<div class="card-detail-line"><span class="card-status--compact" style="background:${si.bg};color:${si.text}">${spot.status}</span></div>`);
            }
            if (newsVal) {
                detailLines.push(`<div class="card-detail-line card-detail-news-text"><i class="fas fa-bullhorn"></i> ${newsVal}</div>`);
            }
            if (hoursText) {
                detailLines.push(`<div class="card-detail-line card-detail-hours"><i class="fas fa-clock"></i> ${hoursText}</div>`);
            }
            const detailHtml = detailLines.length
                ? `<div class="card-detail-block">${detailLines.join('')}</div>`
                : '';

            const spotTags = (State.language === 'ja' ? spot.tags : spot.tags_en) || [];
            const tagsHtml = spotTags.length
                ? `<div class="tag-chips">${spotTags.slice(0, 3).map(tag =>
                    `<span class="tag-chip${State.selectedTags.has(tag) ? ' active' : ''}"
                        onclick="event.stopPropagation(); App.toggleTagFilter('${tag.replace(/'/g, '\\\'')}')">#${tag}</span>`
                  ).join('')}</div>`
                : '';

            let livePostHtml = '';
            if (spot.livePost) {
                const lp = spot.livePost;
                const timeStr = timeAgo(lp.timestamp);
                const safeMsg = lp.message
                    ? lp.message.substring(0, 52).replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    : (lp.imageUrl ? '📸 画像あり（詳細で表示）' : '');
                const cat = lp.category ? escapeHtml(lp.category) : '';
                livePostHtml = `<div class="card-live-post card-live-post--compact">
                    <div class="card-live-compact-meta">
                        ${cat ? `<span class="card-live-cat">${cat}</span>` : ''}
                        <span class="card-live-time">${timeStr}</span>
                    </div>
                    ${safeMsg ? `<div class="card-live-message">${safeMsg}</div>` : ''}
                </div>`;
            }

            card.innerHTML = `
                <div class="card-image-area">${thumbHtml}${placeholder}${indicatorsHtml}</div>
                <div class="card-info">
                    <div class="card-info-main">
                        <div class="card-title">${val(spot, 'name')}</div>
                        ${detailHtml}
                        ${tagsHtml}
                        ${livePostHtml}
                    </div>
                    <div class="card-arrow" role="button" aria-label="詳細">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </div>`;
            const arrowEl = card.querySelector('.card-arrow');
            if (arrowEl) {
                arrowEl.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    UIModule.openModal(spot.id);
                });
            }
            container.appendChild(card);
        });
    },

    highlightCard(spot) {
        document.querySelectorAll('.slide-card').forEach(c => c.classList.remove('active'));
        const target = document.getElementById(`card-${spot.id}`);
        if (!target) return;
        target.classList.add('active');
        const container = document.getElementById('slide-panel');
        if (State.isPC) {
            container.scrollTo({ top: target.offsetTop - container.offsetTop, behavior: 'smooth' });
        } else {
            container.scrollTo({
                left: target.offsetLeft - (container.clientWidth / 2) + (target.offsetWidth / 2),
                behavior: 'smooth'
            });
        }
    },

    // ---- ニュースティッカー ----

    /**
     * ティッカーに表示するアイテムリストを構築して返す
     *
     * 優先順: LIVE投稿（新しい順）→ 通常news
     * 各要素:
     *   { type:'live'|'news', spot, text, imageUrl, timeStr }
     */
    _buildTickerList() {
        const liveItems = [];

        State.allSpots
            .filter(s => s.livePost)
            .filter(s => App._selectedCategories.has(
                s.livePost.category ? s.livePost.category : val(s, 'category')
            ))
            .forEach(spot => {
                const lp = spot.livePost;
                liveItems.push({
                    type:     'live',
                    spot,
                    text:     lp.message || '（画像投稿）',
                    imageUrl: lp.imageUrl || '',
                    timeStr:  timeAgo(lp.timestamp),
                    sortKey:  lp.timestamp.getTime()
                });
            });

        (State.liveStandalonePosts || [])
            .filter(lp => App._standaloneLiveVisible(lp))
            .forEach(lp => {
            liveItems.push({
                type:     'live_map',
                post:     lp,
                text:     lp.message || '（画像投稿）',
                imageUrl: lp.imageUrl || '',
                timeStr:  timeAgo(lp.timestamp),
                sortKey:  lp.timestamp.getTime()
            });
        });

        liveItems.sort((a, b) => (b.sortKey || 0) - (a.sortKey || 0));

        const newsItems = [];
        State.allSpots
            .filter(s => val(s, 'news'))
            .forEach(spot => {
                newsItems.push({
                    type:     'news',
                    spot,
                    text:     val(spot, 'news'),
                    imageUrl: '',
                    timeStr:  ''
                });
            });

        return liveItems.concat(newsItems);
    },

    startTicker() {
        State.tickerList = this._buildTickerList();
        if (State.tickerList.length === 0) {
            document.getElementById('news-ticker-wrapper').style.display = 'none';
            return;
        }
        document.getElementById('news-ticker-wrapper').style.display = 'flex';
        State.currentNewsIndex = 0;
        this._updateTickerText();
        clearInterval(State.newsInterval);
        State.newsInterval = setInterval(() => {
            State.currentNewsIndex = (State.currentNewsIndex + 1) % State.tickerList.length;
            this._updateTickerText();
        }, 5000);
    },

    _updateTickerText() {
        const list  = State.tickerList;
        if (!list || list.length === 0) return;
        const item  = list[State.currentNewsIndex];
        if (!item) return;

        const ticker   = document.getElementById('news-ticker');
        const iconArea = document.getElementById('ticker-icon-area');
        const thumb    = document.getElementById('ticker-live-thumb');
        const textEl   = document.getElementById('ticker-text');
        const spotEl   = document.getElementById('ticker-spot');
        const cntEl    = document.getElementById('ticker-counter');

        // フェードアウト
        textEl.style.opacity = spotEl.style.opacity = '0';

        setTimeout(() => {
            if (item.type === 'live' || item.type === 'live_map') {
                ticker.classList.add('live-mode');
                iconArea.innerHTML = '<span class="ticker-live-dot"></span>';

                if (item.imageUrl) {
                    thumb.src = item.imageUrl;
                    thumb.style.display = 'block';
                    thumb._liveUrl = item.imageUrl;
                    const brd = item.type === 'live_map'
                        ? (LIVE_MARKER_COLOR_BY_ROLE[item.post.role] || '#FF3B6B')
                        : '#2196F3';
                    thumb.style.borderColor = brd;
                } else {
                    thumb.style.display = 'none';
                }
                textEl.innerText = item.text;
                if (item.type === 'live') {
                    spotEl.innerHTML =
                        `<span style="color:#2196F3; font-weight:bold;">LIVE</span> @${val(item.spot, 'name')} · ${item.timeStr}`;
                } else {
                    const lp = item.post;
                    const c = LIVE_MARKER_COLOR_BY_ROLE[lp.role] || '#666';
                    spotEl.innerHTML =
                        `<span style="color:${c}; font-weight:bold;">LIVE</span> ${escapeHtml(lp.category || '')} · ${liveRoleJa(lp.role)} · ${item.timeStr}`;
                }

            } else {
                // 通常ニュースモード
                ticker.classList.remove('live-mode');
                iconArea.innerHTML = '<i class="fas fa-bullhorn"></i>';
                thumb.style.display = 'none';
                textEl.innerText = item.text;
                spotEl.innerText = `@${val(item.spot, 'name')}`;
            }

            cntEl.innerText = `${State.currentNewsIndex + 1}/${list.length}`;
            textEl.style.opacity = spotEl.style.opacity = '1';
        }, 280);
    },

    // サムネクリック → ライトボックス
    _onTickerThumbClick() {
        const thumb = document.getElementById('ticker-live-thumb');
        if (thumb?._liveUrl) this.openLightbox(thumb._liveUrl);
    },

    openNewsList() {
        document.getElementById('news-list-title').innerText = t('newsListTitle');
        const body = document.getElementById('news-list-content');
        body.innerHTML = '';

        const list = State.tickerList || this._buildTickerList();

        if (list.length === 0) {
            body.innerHTML = '<div style="padding:20px; color:#888; text-align:center;">お知らせはありません</div>';
            document.getElementById('news-list-overlay').classList.add('open');
            return;
        }

        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'news-item';

            if (item.type === 'live') {
                div.onclick = () => { App.selectSpot(item.spot); this.closeNewsList(null, true); };
                const safeUrl = item.imageUrl ? item.imageUrl.replace(/'/g, '%27') : '';
                const thumbHtml = item.imageUrl
                    ? `<img src="${item.imageUrl}" class="news-item-live-thumb"
                           onclick="event.stopPropagation(); UIModule.openLightbox('${safeUrl}')"
                           onerror="this.style.display='none'">`
                    : `<div class="news-item-icon news-item-type-live"><i class="fas fa-circle" style="font-size:10px;"></i></div>`;
                div.innerHTML = `
                    ${thumbHtml}
                    <div style="flex:1; min-width:0;">
                        <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
                            <span class="live-badge">● LIVE</span>
                            <span style="font-size:11px; font-weight:bold; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${val(item.spot, 'name')}</span>
                        </div>
                        <div style="font-size:13px; color:#444; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(item.text)}</div>
                        <div class="news-item-time">${item.timeStr}</div>
                    </div>`;
            } else if (item.type === 'live_map') {
                const lp = item.post;
                div.onclick = () => {
                    if (MapModule._map && lp.lng != null && lp.lat != null) {
                        MapModule._map.flyTo({
                            center: [Number(lp.lng), Number(lp.lat)],
                            zoom: Math.max(MapModule._map.getZoom(), 15.8),
                            speed: 0.85
                        });
                    }
                    this.closeNewsList(null, true);
                };
                const safeUrl = item.imageUrl ? item.imageUrl.replace(/'/g, '%27') : '';
                const thumbHtml = item.imageUrl
                    ? `<img src="${item.imageUrl}" class="news-item-live-thumb"
                           style="border-color:${LIVE_MARKER_COLOR_BY_ROLE[lp.role] || '#666'}"
                           onclick="event.stopPropagation(); UIModule.openLightbox('${safeUrl}')"
                           onerror="this.style.display='none'">`
                    : `<div class="news-item-icon news-item-type-live"><i class="fas fa-circle" style="font-size:10px;"></i></div>`;
                const title = `${escapeHtml(lp.category || '')} · ${escapeHtml(liveRoleJa(lp.role))}`;
                div.innerHTML = `
                    ${thumbHtml}
                    <div style="flex:1; min-width:0;">
                        <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
                            <span class="live-badge">● LIVE</span>
                            <span style="font-size:11px; font-weight:bold; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${title}</span>
                        </div>
                        <div style="font-size:13px; color:#444; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(item.text)}</div>
                        <div class="news-item-time">${item.timeStr}</div>
                    </div>`;
            } else {
                div.onclick = () => { App.selectSpot(item.spot); this.closeNewsList(null, true); };
                div.innerHTML = `
                    <div class="news-item-icon"><i class="fas fa-bullhorn"></i></div>
                    <div style="flex:1; min-width:0;">
                        <div style="font-weight:bold; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(item.text)}</div>
                        <div style="font-size:12px; color:#888;">@${val(item.spot, 'name')}</div>
                    </div>`;
            }
            body.appendChild(div);
        });

        document.getElementById('news-list-overlay').classList.add('open');
    },

    closeNewsList(e, force) {
        if (force || e?.target?.id === 'news-list-overlay')
            document.getElementById('news-list-overlay').classList.remove('open');
    },

    // ---- 詳細モーダル ----

    openModal(spotId) {
        const spot = State.allSpots.find(s => s.id === spotId);
        if (!spot) return;
        State.currentSpot = spot;

        const images = [spot.imageUrl, spot.imageUrl2, spot.imageUrl3].filter(Boolean);
        UIModule._buildSlider(images, spot.emoji);

        document.getElementById('modal-cat').innerText   = val(spot, 'category');
        document.getElementById('modal-title').innerText = val(spot, 'name');

        // 営業時間
        const hoursText = val(spot, 'hours');
        const hoursWrap = document.getElementById('modal-hours-wrap');
        if (hoursText) {
            hoursWrap.style.display = 'flex';
            document.getElementById('modal-hours').textContent = hoursText;
        } else {
            hoursWrap.style.display = 'none';
        }

        // タグ
        const tagsEl = document.getElementById('modal-tags');
        tagsEl.innerHTML = '';
        const spotTags = (State.language === 'ja' ? spot.tags : spot.tags_en) || [];
        spotTags.forEach(tag => {
            const chip = document.createElement('span');
            chip.className = 'tag-chip' + (State.selectedTags.has(tag) ? ' active' : '');
            chip.textContent = '#' + tag;
            chip.onclick = () => App.toggleTagFilter(tag);
            tagsEl.appendChild(chip);
        });

        const addrText = val(spot, 'address');
        const phoneText = val(spot, 'phone');
        const contactEl = document.getElementById('modal-contact');
        const addrWrap = document.getElementById('modal-address-wrap');
        const phoneWrap = document.getElementById('modal-phone-wrap');
        const phoneLink = document.getElementById('modal-phone-link');
        if (addrText || phoneText) {
            contactEl.style.display = 'block';
        } else {
            contactEl.style.display = 'none';
        }
        if (addrText) {
            addrWrap.style.display = 'flex';
            document.getElementById('modal-address').textContent = addrText;
        } else {
            addrWrap.style.display = 'none';
        }
        if (phoneText) {
            phoneWrap.style.display = 'flex';
            phoneLink.textContent = phoneText;
            const telNorm = phoneText.replace(/[^\d+]/g, '');
            if (telNorm.length >= 8) {
                phoneLink.href = 'tel:' + telNorm;
                phoneLink.style.pointerEvents = 'auto';
            } else {
                phoneLink.removeAttribute('href');
                phoneLink.style.pointerEvents = 'none';
            }
        } else {
            phoneWrap.style.display = 'none';
        }
        // ライブ投稿セクション
        const livePostEl = document.getElementById('modal-live-post');
        if (spot.livePost) {
            const lp = spot.livePost;
            const timeStr = timeAgo(lp.timestamp);
            const safeUrl = lp.imageUrl ? lp.imageUrl.replace(/'/g, '%27') : '';
            const imgHtml = lp.imageUrl
                ? `<img src="${lp.imageUrl}" class="modal-live-image"
                    onclick="UIModule.openLightbox('${safeUrl}')"
                    onerror="this.style.display='none'">`
                : '';
            const safeMsg = lp.message
                ? lp.message.replace(/</g, '&lt;').replace(/>/g, '&gt;')
                : '';
            const cat = lp.category ? escapeHtml(lp.category) : '';
            const roleLine = lp.role ? ` · ${escapeHtml(liveRoleJa(lp.role))}` : '';
            livePostEl.innerHTML = `
                <div class="modal-live-post-header">
                    <span class="live-badge">● LIVE</span>
                    <span class="modal-live-time">${timeStr}</span>
                </div>
                ${cat ? `<div style="font-size:13px;font-weight:bold;color:#1565C0;margin-bottom:6px">${cat}${roleLine}</div>` : ''}
                ${imgHtml}
                ${safeMsg ? `<div class="modal-live-message">${safeMsg}</div>` : ''}`;
            livePostEl.style.display = 'block';
        } else {
            livePostEl.style.display = 'none';
            livePostEl.innerHTML = '';
        }

        document.getElementById('modal-text').innerText  = val(spot, 'detail') || val(spot, 'desc') || '';
        document.getElementById('btn-nav-text').innerText = t('go');
        document.getElementById('modal-nav-btn').href =
            `https://www.google.com/maps/dir/?api=1&destination=${spot.coords[1]},${spot.coords[0]}`;

        document.getElementById('btn-coupon-text').innerText = t('coupon');
        document.getElementById('modal-coupon-btn').style.display = val(spot, 'coupon') ? 'block' : 'none';

        document.getElementById('modal-overlay').classList.add('open');
        gtag('event', 'view_item', { item_id: spot.name });
    },

    closeModal(e, force) {
        if (force || e?.target?.id === 'modal-overlay')
            document.getElementById('modal-overlay').classList.remove('open');
    },

    showCoupon() {
        const spot = State.currentSpot;
        if (!spot || !val(spot, 'coupon')) return;
        document.getElementById('coupon-text').innerText = val(spot, 'coupon');
        document.getElementById('coupon-overlay').classList.add('open');
        gtag('event', 'use_coupon', { item_id: spot.name });
    },

    closeCoupon(e, force) {
        if (force || e?.target?.id === 'coupon-overlay')
            document.getElementById('coupon-overlay').classList.remove('open');
    },

    // ---- 画像スライダー (詳細モーダル) ----

    _sliderImages: [],
    _sliderIndex:  0,

    _buildSlider(images, emoji) {
        const track = document.getElementById('modal-slider-track');
        const dots  = document.getElementById('slider-dots');
        const prev  = document.getElementById('slider-prev');
        const next  = document.getElementById('slider-next');
        if (!track) return;
        track.innerHTML = dots.innerHTML = '';
        this._sliderImages = images;
        this._sliderIndex  = 0;

        if (images.length === 0) {
            track.innerHTML = `<div class="modal-slider-empty">${emoji}</div>`;
            prev.classList.add('hidden');
            next.classList.add('hidden');
            return;
        }
        images.forEach((url, i) => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'modal-slide-img';
            img.alt = '';
            img.onerror = () => { img.style.opacity = '0'; };
            track.appendChild(img);

            const dot = document.createElement('button');
            dot.className = 'slider-dot' + (i === 0 ? ' active' : '');
            dot.onclick = () => this._goToSlide(i);
            dots.appendChild(dot);
        });
        prev.classList.toggle('hidden', images.length <= 1);
        next.classList.toggle('hidden', images.length <= 1);
        this._updateSlider();
    },

    sliderNav(dir) {
        const len = this._sliderImages.length;
        if (len <= 1) return;
        this._sliderIndex = (this._sliderIndex + dir + len) % len;
        this._updateSlider();
    },

    _goToSlide(i) {
        this._sliderIndex = i;
        this._updateSlider();
    },

    _updateSlider() {
        const track = document.getElementById('modal-slider-track');
        if (track) track.style.transform = `translateX(-${this._sliderIndex * 100}%)`;
        document.querySelectorAll('#slider-dots .slider-dot').forEach((d, i) => {
            d.classList.toggle('active', i === this._sliderIndex);
        });
    },

    // ---- ライトボックス (LIVE画像拡大) ----

    openLightbox(url) {
        const overlay = document.getElementById('lightbox-overlay');
        const img = document.getElementById('lightbox-img');
        if (!overlay || !img) return;
        img.src = url;
        overlay.classList.add('open');
    },

    closeLightbox() {
        const overlay = document.getElementById('lightbox-overlay');
        const img = document.getElementById('lightbox-img');
        if (overlay) overlay.classList.remove('open');
        if (img) img.src = '';
    }
};

// ================================================================
// App — エントリポイント・イベント連携
// ================================================================
const App = {
    _selectedCategories: new Set(),
    _seenFilterCategories: new Set(),
    _postsInitialized: false,

    /** 絞り込み判定: 店舗は LIVE 投稿のカテゴリを優先、なければマスタのカテゴリ */
    _effectiveFilterCategorySpot(spot) {
        if (spot.livePost && spot.livePost.category) return spot.livePost.category;
        return val(spot, 'category');
    },

    _standaloneLiveVisible(lp) {
        const c = lp.category;
        if (!c) return true;
        return this._selectedCategories.has(c);
    },

    _allFilterCategoryKeys() {
        const catSet = new Set();
        State.allSpots.forEach(s => {
            const c = val(s, 'category');
            if (c) catSet.add(c);
            if (s.livePost && s.livePost.category) catSet.add(s.livePost.category);
        });
        (State.liveStandalonePosts || []).forEach(lp => {
            if (lp.category) catSet.add(lp.category);
        });
        return [...catSet].sort((a, b) => String(a).localeCompare(String(b), 'ja'));
    },

    /** 初登場のカテゴリだけ選択に自動追加（手動OFFした既存カテゴリは維持） */
    _mergeNewFilterCategories(cats) {
        cats.forEach(cat => {
            if (!this._seenFilterCategories.has(cat)) {
                this._seenFilterCategories.add(cat);
                this._selectedCategories.add(cat);
            }
        });
    },

    init() {
        // ?refresh=1 パラメータで強制再取得 (AppSheet Webhook から呼び出し可能)
        if (new URLSearchParams(location.search).get('refresh') === '1') {
            State.lastDataHash = '';
        }
        MapModule.init();

        // 安全網: 50 秒後もまだ loading 中なら Retry ボタンを表示して操作できるようにする
        setTimeout(() => {
            const el = document.getElementById('loading');
            if (el && el.style.display !== 'none') {
                console.warn('[App] 50s 経過しても loading 中 — Retry ボタンを表示');
                const retryEl = document.getElementById('loading-retry');
                if (retryEl) retryEl.style.display = 'block';
            }
        }, 50000);
    },

    // データ取得完了後のメイン処理
    _onDataReady() {
        const spots = State.allSpots;
        document.getElementById('loading').style.display = 'none';

        if (!this._postsInitialized) {
            this._postsInitialized = true;
            PostsModule.fetch();
            PostsModule.startPolling();
            EventScheduleModule.fetch();
            EventScheduleModule.startPolling();
            EventScheduleModule.startTick();
        }

        if (spots.length > 0 && this._selectedCategories.size === 0) {
            [...new Set(spots.map(s => val(s, 'category')))].filter(Boolean)
                .forEach(c => {
                    this._selectedCategories.add(c);
                    this._seenFilterCategories.add(c);
                });
        }
        // posts データを店舗スポットへマージ
        PostsModule._attachLiveToSpots();
        this._refreshUI();
    },

    _refreshUI() {
        document.getElementById('filter-btn-text').innerText = t('filter');
        document.getElementById('layer-btn-text').innerText  = t('layers');
        const homeText = document.getElementById('home-btn-text');
        if (homeText) homeText.innerText = t('map');

        UIModule.generateFilters(State.allSpots);
        UIModule.renderLayerPanel();
        this._applyFilters();

        // LIVE投稿 + 通常newsを統合してティッカーを再起動
        clearInterval(State.newsInterval);
        State.currentNewsIndex = 0;
        UIModule.startTicker();
    },

    _applyFilters() {
        const targets = State.allSpots.filter(s => {
            const cat = this._effectiveFilterCategorySpot(s);
            if (!this._selectedCategories.has(cat)) return false;
            // タグフィルタ: 選択タグがあれば、スポットが少なくとも1つ一致するもののみ表示
            if (State.selectedTags.size > 0) {
                const spotTags = (State.language === 'ja' ? s.tags : s.tags_en) || [];
                if (!spotTags.some(tag => State.selectedTags.has(tag))) return false;
            }
            return true;
        });
        UIModule.updateMarkers(targets);
        UIModule.renderCards(targets);
    },

    // ---- 公開メソッド (HTML onclick から参照) ----

    toggleLanguage() {
        State.language = State.language === 'ja' ? 'en' : 'ja';
        document.getElementById('lang-text').innerText = State.language.toUpperCase();
        // カテゴリ・タグは言語ごとに異なるためリセット
        this._selectedCategories.clear();
        this._seenFilterCategories.clear();
        this._allFilterCategoryKeys().forEach(c => {
            this._seenFilterCategories.add(c);
            this._selectedCategories.add(c);
        });
        State.selectedTags.clear();
        this._refreshUI();
    },

    toggleCategory(category, isChecked) {
        if (isChecked) this._selectedCategories.add(category);
        else           this._selectedCategories.delete(category);

        const allCheck = document.getElementById('filter-all');
        const inputs   = document.querySelectorAll('#filter-list input:not(#filter-all)');
        if (allCheck) allCheck.checked = [...inputs].every(i => i.checked);
        this._applyFilters();
    },

    toggleAll(isChecked) {
        document.querySelectorAll('#filter-list input').forEach(input => {
            input.checked = isChecked;
            const cat = input.getAttribute('data-cat');
            if (cat) {
                if (isChecked) this._selectedCategories.add(cat);
                else           this._selectedCategories.delete(cat);
            }
        });
        this._applyFilters();
    },

    selectSpot(spot) {
        document.querySelectorAll('.custom-marker').forEach(m => m.classList.remove('active'));
        document.getElementById(`marker-${spot.id}`)?.classList.add('active');
        // PC で折りたたまれていたら展開
        if (State.isPC && document.body.classList.contains('sidebar-collapsed')) {
            UIModule.toggleSidebar();
        }
        MapModule.flyTo(spot);
        UIModule.expandCardsSheetIfCollapsed();
        UIModule.highlightCard(spot);
        gtag('event', 'select_content', { content_type: 'spot', item_id: spot.name });
    },

    focusCurrentNews() {
        const list = State.tickerList;
        if (!list || list.length === 0) return;
        const item = list[State.currentNewsIndex];
        if (item) this.selectSpot(item.spot);
    },

    // タグフィルタのトグル（カード・モーダルのチップとパネルから共有）
    toggleTagFilter(tag) {
        if (State.selectedTags.has(tag)) {
            State.selectedTags.delete(tag);
        } else {
            State.selectedTags.add(tag);
        }
        // フィルターパネルのチップ状態を同期
        document.querySelectorAll('.tag-filter-chip').forEach(chip => {
            chip.classList.toggle('active', State.selectedTags.has(chip.dataset.tag));
        });
        // カード内のタグチップ状態を同期
        document.querySelectorAll('.tag-chip').forEach(chip => {
            const chipTag = chip.textContent.replace(/^#/, '');
            chip.classList.toggle('active', State.selectedTags.has(chipTag));
        });
        // モーダル内タグチップを同期
        document.querySelectorAll('#modal-tags .tag-chip').forEach(chip => {
            const chipTag = chip.textContent.replace(/^#/, '');
            chip.classList.toggle('active', State.selectedTags.has(chipTag));
        });
        this._applyFilters();
    }
};

// ================================================================
// BOOT
// ================================================================
App.init();
</script>
