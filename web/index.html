    openModal(spotId) {
        const spot = State.allSpots.find(s => s.id === spotId);
        if (!spot) return;
        State.currentSpot = spot;

        const images = [spot.imageUrl, spot.imageUrl2, spot.imageUrl3].filter(Boolean);
        UIModule._buildSlider(images, spot.emoji);

        document.getElementById('modal-cat').innerText   = val(spot, 'category');
        document.getElementById('modal-title').innerText = val(spot, 'name');

        // ステータス
        const statusText = getSpotStatusText(spot);
        const statusWrap = document.getElementById('modal-status-wrap');
        const statusEl = document.getElementById('modal-status');
        if (statusText && statusWrap && statusEl) {
            const si = getStatusInfo(statusText);
            statusWrap.style.display = 'block';
            statusEl.textContent = statusText;
            statusEl.style.background = si.bg;
            statusEl.style.color = si.text;
        } else if (statusWrap) {
            statusWrap.style.display = 'none';
        }

        // 営業時間
        const hoursText = val(spot, 'hours');
        const hoursWrap = document.getElementById('modal-hours-wrap');
        if (hoursText) {
            hoursWrap.style.display = 'flex';
            document.getElementById('modal-hours').textContent = hoursText;
        } else {
            hoursWrap.style.display = 'none';
        }

        // タグ
        const tagsEl = document.getElementById('modal-tags');
        tagsEl.innerHTML = '';
        const spotTags = (State.language === 'ja' ? spot.tags : spot.tags_en) || [];
        spotTags.forEach(tag => {
            const chip = document.createElement('span');
            chip.className = 'tag-chip' + (State.selectedTags.has(tag) ? ' active' : '');
            chip.textContent = '#' + tag;
            chip.onclick = () => App.toggleTagFilter(tag);
            tagsEl.appendChild(chip);
        });

        const addrText = val(spot, 'address');
        const phoneText = val(spot, 'phone');
        const contactEl = document.getElementById('modal-contact');
        const addrWrap = document.getElementById('modal-address-wrap');
        const phoneWrap = document.getElementById('modal-phone-wrap');
        const phoneLink = document.getElementById('modal-phone-link');
        if (addrText || phoneText) {
            contactEl.style.display = 'block';
        } else {
            contactEl.style.display = 'none';
        }
        if (addrText) {
            addrWrap.style.display = 'flex';
            document.getElementById('modal-address').textContent = addrText;
        } else {
            addrWrap.style.display = 'none';
        }
        if (phoneText) {
            phoneWrap.style.display = 'flex';
            phoneLink.textContent = phoneText;
            const telNorm = phoneText.replace(/[^\d+]/g, '');
            if (telNorm.length >= 8) {
                phoneLink.href = 'tel:' + telNorm;
                phoneLink.style.pointerEvents = 'auto';
            } else {
                phoneLink.removeAttribute('href');
                phoneLink.style.pointerEvents = 'none';
            }
        } else {
            phoneWrap.style.display = 'none';
        }
        // かわら版は専用モーダルで表示（詳細モーダルには出さない）
        const livePostEl = document.getElementById('modal-live-post');

        } else if (kawaraBtn) {
            kawaraBtn.style.display = 'none';

        const _descVal = val(spot, 'desc');
        const _newsVal = val(spot, 'news');

        const newsWrap = document.getElementById('modal-news-wrap');

        const newsEl = document.getElementById('modal-news');

            if (descLabel) descLabel.textContent = t('descLabel');
            descEl.textContent = _descVal;
        } else if (descWrap) {
            descWrap.style.display = 'none';
            if (descEl) descEl.textContent = '';

        if (_newsVal && newsWrap && newsEl) {
            newsWrap.style.display = 'block';
            const newsLabel = document.getElementById('modal-news-label');
            if (newsLabel) {
                newsLabel.innerHTML = '<i class="fas fa-bullhorn" aria-hidden="true"></i> ' + escapeHtml(t('newsLabel'));

    // ---- 画像スライダー (詳細モーダル) ----

    _sliderImages: [],
    _sliderIndex:  0,

    _buildSlider(images, emoji) {
        const track = document.getElementById('modal-slider-track');
        const dots  = document.getElementById('slider-dots');
        const prev  = document.getElementById('slider-prev');
        const next  = document.getElementById('slider-next');
        if (!track) return;
        track.innerHTML = dots.innerHTML = '';
        this._sliderImages = images;
        this._sliderIndex  = 0;

        if (images.length === 0) {
            track.innerHTML = `<div class="modal-slider-empty">${emoji}</div>`;
            prev.classList.add('hidden');
            next.classList.add('hidden');
            return;
        }
        images.forEach((url, i) => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'modal-slide-img';
            img.alt = '';
            img.onerror = () => { img.style.opacity = '0'; };
            track.appendChild(img);

            const dot = document.createElement('button');
            dot.className = 'slider-dot' + (i === 0 ? ' active' : '');
            dot.onclick = () => this._goToSlide(i);
            dots.appendChild(dot);
        });
        prev.classList.toggle('hidden', images.length <= 1);
        next.classList.toggle('hidden', images.length <= 1);
        this._updateSlider();
    },

    sliderNav(dir) {
        const len = this._sliderImages.length;
        if (len <= 1) return;
        this._sliderIndex = (this._sliderIndex + dir + len) % len;
        this._updateSlider();
    },

    _goToSlide(i) {
        this._sliderIndex = i;
        this._updateSlider();
    },

    _updateSlider() {
        const track = document.getElementById('modal-slider-track');
        if (track) track.style.transform = `translateX(-${this._sliderIndex * 100}%)`;
        document.querySelectorAll('#slider-dots .slider-dot').forEach((d, i) => {
            d.classList.toggle('active', i === this._sliderIndex);
        });
    },

    // ---- ライトボックス (LIVE画像拡大) ----

    openLightbox(url) {
        const overlay = document.getElementById('lightbox-overlay');
        const img = document.getElementById('lightbox-img');
        if (!overlay || !img) return;
        img.src = url;
        overlay.classList.add('open');
    },

    closeLightbox() {
        const overlay = document.getElementById('lightbox-overlay');
        const img = document.getElementById('lightbox-img');
        if (overlay) overlay.classList.remove('open');
        if (img) img.src = '';
    }
};

// ================================================================
// App — エントリポイント・イベント連携
// ================================================================
const App = {
    _selectedCategories: new Set(),
    _seenFilterCategories: new Set(),
    _postsInitialized: false,

    /** 絞り込み判定: 店舗は LIVE 投稿のカテゴリを優先、なければマスタのカテゴリ */
    _effectiveFilterCategorySpot(spot) {
        if (spot.livePost && spot.livePost.category) return spot.livePost.category;
        return val(spot, 'category');
    },

    _standaloneLiveVisible(lp) {
        const c = lp.category;
        if (!c) return true;
        return this._selectedCategories.has(c);
    },

    _allFilterCategoryKeys() {
        const catSet = new Set();
        State.allSpots.forEach(s => {
            const c = val(s, 'category');
            if (c) catSet.add(c);
            if (s.livePost && s.livePost.category) catSet.add(s.livePost.category);
        });
        (State.liveStandalonePosts || []).forEach(lp => {
            if (lp.category) catSet.add(lp.category);
        });
        return [...catSet].sort((a, b) => String(a).localeCompare(String(b), 'ja'));
    },

    /** 初登場のカテゴリだけ選択に自動追加（手動OFFした既存カテゴリは維持） */
    _mergeNewFilterCategories(cats) {
        cats.forEach(cat => {
            if (!this._seenFilterCategories.has(cat)) {
                this._seenFilterCategories.add(cat);
                this._selectedCategories.add(cat);
            }
        });
    },

    init() {
        // ?refresh=1 パラメータで強制再取得 (AppSheet Webhook から呼び出し可能)
        if (new URLSearchParams(location.search).get('refresh') === '1') {
            State.lastDataHash = '';
        }
        MapModule.init();

        // 安全網: 50 秒後もまだ loading 中なら Retry ボタンを表示して操作できるようにする
        setTimeout(() => {
            const el = document.getElementById('loading');
            if (el && el.style.display !== 'none') {
                console.warn('[App] 50s 経過しても loading 中 — Retry ボタンを表示');
                const retryEl = document.getElementById('loading-retry');
                if (retryEl) retryEl.style.display = 'block';
            }
        }, 50000);
    },

    // データ取得完了後のメイン処理
    _onDataReady() {
        const spots = State.allSpots;
        document.getElementById('loading').style.display = 'none';

        if (!this._postsInitialized) {
            this._postsInitialized = true;
            PostsModule.fetch();
            PostsModule.startPolling();
        }

        if (spots.length > 0 && this._selectedCategories.size === 0) {
            [...new Set(spots.map(s => val(s, 'category')))].filter(Boolean)
                .forEach(c => {
                    this._selectedCategories.add(c);
                    this._seenFilterCategories.add(c);
                });
        }
        // posts データを店舗スポットへマージ
        PostsModule._attachLiveToSpots();
        this._refreshUI();
    },

    _refreshUI() {
        document.getElementById('filter-btn-text').innerText = t('filter');
        document.getElementById('layer-btn-text').innerText  = t('layers');
        const homeText = document.getElementById('home-btn-text');
        if (homeText) homeText.innerText = t('map');

        UIModule.generateFilters(State.allSpots);
        UIModule.renderLayerPanel();
        this._applyFilters();

        UIModule.startTicker();
    },

    _applyFilters() {
        const targets = State.allSpots.filter(s => {
            const cat = this._effectiveFilterCategorySpot(s);
            if (!this._selectedCategories.has(cat)) return false;
            // タグフィルタ: 選択タグがあれば、スポットが少なくとも1つ一致するもののみ表示
            if (State.selectedTags.size > 0) {
                const spotTags = (State.language === 'ja' ? s.tags : s.tags_en) || [];
                if (!spotTags.some(tag => State.selectedTags.has(tag))) return false;
            }
            return true;
        });
        UIModule.updateMarkers(targets);
        UIModule.renderCards(targets);
    },

    // ---- 公開メソッド (HTML onclick から参照) ----

    toggleLanguage() {
        State.language = State.language === 'ja' ? 'en' : 'ja';
        document.getElementById('lang-text').innerText = State.language.toUpperCase();
        // カテゴリ・タグは言語ごとに異なるためリセット
        this._selectedCategories.clear();
        this._seenFilterCategories.clear();
        this._allFilterCategoryKeys().forEach(c => {
            this._seenFilterCategories.add(c);
            this._selectedCategories.add(c);
        });
        State.selectedTags.clear();
        this._refreshUI();
    },

    toggleCategory(category, isChecked) {
        if (isChecked) this._selectedCategories.add(category);
        else           this._selectedCategories.delete(category);

        const allCheck = document.getElementById('filter-all');
        const inputs   = document.querySelectorAll('#filter-list input:not(#filter-all)');
        if (allCheck) allCheck.checked = [...inputs].every(i => i.checked);
        this._applyFilters();
    },

    toggleAll(isChecked) {
        document.querySelectorAll('#filter-list input').forEach(input => {
            input.checked = isChecked;
            const cat = input.getAttribute('data-cat');
            if (cat) {
                if (isChecked) this._selectedCategories.add(cat);
                else           this._selectedCategories.delete(cat);
            }
        });
        this._applyFilters();
    },

    selectSpot(spot) {
        State.currentSpot = spot;
        document.querySelectorAll('.custom-marker').forEach(m => m.classList.remove('active'));
        // PC で折りたたまれていたら展開
        if (State.isPC && document.body.classList.contains('sidebar-collapsed')) {
            UIModule.toggleSidebar();
        }
        MapModule.flyTo(spot);
        if (MapModule._map) {
            MapModule._map.once('moveend', () => {
                document.getElementById(`marker-${spot.id}`)?.classList.add('active');
            });
        }
        UIModule.expandCardsSheetIfCollapsed();
        UIModule.highlightCard(spot);
        gtag('event', 'select_content', { content_type: 'spot', item_id: spot.name });
    },

    focusCurrentNews() {
        const list = State.tickerList;
        if (!list || list.length === 0) return;
        const item = list[State.currentNewsIndex];
        if (item) this.selectSpot(item.spot);
    },

    // タグフィルタのトグル（カード・モーダルのチップとパネルから共有）
    toggleTagFilter(tag) {
        if (State.selectedTags.has(tag)) {
            State.selectedTags.delete(tag);
        } else {
            State.selectedTags.add(tag);
        }
        // フィルターパネルのチップ状態を同期
        document.querySelectorAll('.tag-filter-chip').forEach(chip => {
            chip.classList.toggle('active', State.selectedTags.has(chip.dataset.tag));
        });
        // カード内のタグチップ状態を同期
        document.querySelectorAll('.tag-chip').forEach(chip => {
            const chipTag = chip.textContent.replace(/^#/, '');
            chip.classList.toggle('active', State.selectedTags.has(chipTag));
        });
        // モーダル内タグチップを同期
        document.querySelectorAll('#modal-tags .tag-chip').forEach(chip => {
            const chipTag = chip.textContent.replace(/^#/, '');
            chip.classList.toggle('active', State.selectedTags.has(chipTag));
        });
        this._applyFilters();
    }
};

// ================================================================
// BOOT
// ================================================================
App.init();
</script>
