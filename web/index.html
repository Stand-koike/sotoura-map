<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>外浦マップ</title>

    <!-- エリア設定: secrets → config → config.local（任意）。新エリアは config.js のみ編集 -->
    <script src="secrets.local.js" onerror="window.__SHIMODA_MAP_SECRETS__=window.__SHIMODA_MAP_SECRETS__||{}"></script>
    <script src="line-contract.js"></script>
    <script src="config.js"></script>
    <script src="config.local.js" onerror="void 0"></script>
    <script>
        (function () {
            var cfg = window.__SHIMODA_MAP_CONFIG__;
            if (cfg && cfg.APP_TITLE) document.title = cfg.APP_TITLE;
            var gaId = cfg && cfg.GA_MEASUREMENT_ID;
            if (!gaId) {
                window.gtag = function () {};
                return;
            }
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(gaId);
            document.head.appendChild(s);
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            window.gtag = gtag;
            gtag('js', new Date());
            gtag('config', gaId);
        })();
    </script>

    <script src='https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css' rel='stylesheet' />
    <!-- 日の出／日の入り・薄明（イラスト昼夜夕切り替え）。失敗・遅延時は昼画像のみ -->
    <!-- async: ページ起動をブロックしない。getIllustrationPhase は typeof SunCalc === 'undefined' ガード済み -->
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js" async></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================================
           RESET & CSS VARIABLES
           ============================================================ */
        * { box-sizing: border-box; }

        :root {
            /* ===== Summer Resort Palette ===== */
            --color-primary:    #0096C7;   /* Ocean Blue — マーカー・チェック・トグル */
            --color-secondary:  #E0F7FF;   /* Light Sky */
            --color-accent:     #FF5C38;   /* Sunset Coral — ニュースバッジ */
            --color-nav:        #0077B6;   /* Deep Ocean — ナビボタン */
            --color-filter:     #FF7043;   /* Coral Orange — 絞り込みボタン */
            --color-layer:      #00BCD4;   /* Turquoise — レイヤーボタン */
            --color-text-main:  #1A3A4A;   /* Navy */
            --color-text-sub:   #6B8A9C;
            --bg-glass:         rgba(255, 255, 255, 0.97);
            --shadow-soft:      0 4px 24px rgba(0, 100, 180, 0.15);
            --shadow-warm:      0 4px 16px rgba(255, 100, 50, 0.25);
            --sidebar-width:    340px;
        }

        body {
            margin: 0; padding: 0;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            /* イラストマップ外側の背景色 */
            background: #A8D8E8;
        }

        /* ============================================================
           MAP
           ============================================================ */
        #map {
            position: absolute; top: 0; bottom: 0; right: 0;
            width: 100%;
            transition: width 0.3s ease;
            /* Mapbox のデフォルト黒ではなく、イラスト外周と同系色（ピッチ時の余白用） */
            background: #A8D8E8;
        }
        /* Mapbox デフォルトロゴ・帰属を非表示 (地図外の余白で見えない) */
        .mapboxgl-ctrl-bottom-right,
        .mapboxgl-ctrl-bottom-left { display: none; }

        /* ============================================================
           LOADING INDICATOR
           ============================================================ */
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-glass); padding: 15px 30px;
            border-radius: 30px; font-weight: bold;
            color: var(--color-primary); z-index: 9999;
            pointer-events: none; box-shadow: var(--shadow-soft);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        @media (max-width: 767px) {
            #loading {
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
        }
        #loading .loading-retry {
            display: none; margin-top: 8px; text-align: center;
        }
        #loading .loading-retry button {
            pointer-events: auto; cursor: pointer;
            background: var(--color-primary); color: white; border: none;
            border-radius: 20px; padding: 6px 16px; font-size: 12px;
            font-weight: bold;
        }

        /* ============================================================
           LEFT CONTROLS (言語 / フィルター / レイヤー)
           ============================================================ */
        .controls-container {
            position: absolute; top: 20px; left: 20px; z-index: 30;
            display: flex; flex-direction: column; gap: 10px;
            align-items: flex-start;
            transition: left 0.3s ease;
        }
        @media (max-width: 767px) {
            .controls-container {
                top: auto; bottom: 0; left: 0; right: 0;
                flex-direction: row; gap: 0;
                align-items: stretch;
                background: #fff;
                padding: 0;
                padding-bottom: env(safe-area-inset-bottom, 0px);
                box-shadow: 0 -1px 0 rgba(0,0,0,0.08), 0 -4px 20px rgba(0, 80, 150, 0.10);
                /* オーバーレイ(150)・パネル(200)より高く設定してボタンを常にタップ可能にする */
                z-index: 220;
                border-top: 1px solid rgba(0,0,0,0.06);
            }
            .controls-container > * {
                flex: 1; min-width: 0;
            }
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.97); border: 1.5px solid rgba(0,150,210,0.18);
            color: var(--color-text-main);
            border-radius: 30px; padding: 8px 16px;
            font-weight: bold; font-size: 13px; cursor: pointer;
            box-shadow: var(--shadow-soft);
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s; white-space: nowrap;
            touch-action: manipulation; /* タップ遅延・誤ズーム防止 */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        @media (max-width: 767px) {
            .ctrl-btn {
                border-radius: 0; padding: 10px 4px 8px;
                font-size: 10px; box-shadow: none; border: none;
                justify-content: center; width: 100%;
                background: transparent;
                flex-direction: column; gap: 2px;
                color: var(--color-text-sub);
                position: relative;
                transition: color 0.2s;
                min-height: 54px; /* タップ領域を確保 */
            }
            .ctrl-btn i {
                font-size: 18px;
                line-height: 1;
            }
            .ctrl-btn.primary, .ctrl-btn.layer {
                box-shadow: none;
                background: transparent;
                color: var(--color-text-sub);
            }
            .ctrl-btn.tab-active {
                color: var(--color-primary);
            }
            .ctrl-btn.tab-active::after {
                content: '';
                position: absolute;
                top: 0; left: 20%; right: 20%;
                height: 2.5px;
                background: var(--color-primary);
                border-radius: 0 0 2px 2px;
            }
        }
        .ctrl-btn.primary {
            background: linear-gradient(135deg, #FF7043, #FF5722);
            border-color: transparent; color: white;
            box-shadow: var(--shadow-warm);
        }
        .ctrl-btn.layer {
            background: linear-gradient(135deg, #00E5FF, #00BCD4);
            border-color: transparent; color: white;
            box-shadow: 0 4px 16px rgba(0,188,212,0.35);
        }
        .ctrl-btn:active { transform: scale(0.95); }

        /* ホームタブ: PC では非表示 */
        .bottom-tab-home { display: none; }
        @media (max-width: 767px) {
            .bottom-tab-home { display: flex; }
        }

        /* ドロップダウンパネル共通 */
        .ctrl-panel-wrapper { position: relative; }
        .ctrl-panel {
            background: var(--bg-glass); border-radius: 16px; padding: 14px 15px;
            box-shadow: var(--shadow-soft); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; gap: 8px;
            min-width: 190px;
            position: absolute; top: calc(100% + 8px); left: 0;
            transform-origin: top left;
            transition: opacity 0.2s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0; transform: scale(0.9) translateY(-4px);
            pointer-events: none; z-index: 100;
        }
        .ctrl-panel.open {
            opacity: 1; transform: scale(1) translateY(0);
            pointer-events: auto;
        }
        @media (max-width: 767px) {
            .ctrl-panel {
                position: fixed; top: auto; left: 4% !important; right: 4%;
                /* ボトムナビ(約54px + safe-area)の上に出す */
                bottom: calc(58px + env(safe-area-inset-bottom, 0px));
                width: 92%; max-width: 360px; margin: 0 auto;
                border-radius: 18px 18px 14px 14px;
                transform-origin: bottom center;
                transform: translateY(12px);
                max-height: calc(55vh - 54px);
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                /* モバイルではbackdrop-filterを外してレンダリング負荷を下げる */
                backdrop-filter: none;
                background: rgba(255,255,255,0.99);
                box-shadow: 0 -2px 20px rgba(0,80,150,0.15), 0 8px 32px rgba(0,0,0,0.12);
                z-index: 200;
                will-change: transform, opacity;
            }
            .ctrl-panel.open {
                transform: translateY(0);
            }
        }
        .ctrl-panel-title {
            font-size: 10px; font-weight: bold;
            color: var(--color-text-sub); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 4px;
        }

        /* カテゴリフィルター */
        .filter-item {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-size: 14px;
            color: var(--color-text-main);
            padding: 8px 2px; /* タップ領域を拡大 */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .filter-item input { display: none; }
        .checkmark {
            width: 20px; height: 20px; flex-shrink: 0;
            border: 2px solid #ccc; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .filter-item input:checked + .checkmark {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }
        .checkmark::after { content: '✔'; color: white; font-size: 12px; display: none; }
        .filter-item input:checked + .checkmark::after { display: block; }
        /* カテゴリアイコン */
        .cat-icon {
            width: 22px; height: 22px; flex-shrink: 0; border-radius: 50%;
            background: var(--color-secondary); color: var(--color-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
        }

        /* レイヤートグル */
        .layer-item {
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; color: var(--color-text-main);
            padding: 8px 2px; /* タップ領域を拡大 */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .layer-icon {
            width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
        }
        .layer-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .toggle-switch {
            position: relative; width: 38px; height: 22px; flex-shrink: 0;
            touch-action: manipulation; cursor: pointer;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
        .toggle-track {
            position: absolute; inset: 0; background: #ccc;
            border-radius: 22px; cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-switch input:checked + .toggle-track { background: var(--color-primary); }
        .toggle-track::after {
            content: ''; position: absolute;
            width: 16px; height: 16px; border-radius: 50%;
            background: white; top: 3px; left: 3px;
            transition: transform 0.2s;
        }
        .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }

        /* ============================================================
           NEWS TICKER
           ============================================================ */
        .news-ticker-wrapper {
            position: absolute; top: 20px; z-index: 25;
            pointer-events: none; height: 45px;
            display: flex; justify-content: center;
            transition: all 0.3s ease;
            width: 100%; left: 0;
        }
        .news-ticker {
            background: rgba(255, 255, 255, 0.98); border-radius: 25px;
            box-shadow: var(--shadow-soft); padding: 0 10px 0 15px;
            display: flex; align-items: center; gap: 10px;
            width: 90%; max-width: 450px; height: 100%;
            pointer-events: auto; animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown { from { transform: translateY(-100px); } to { transform: translateY(0); } }
        @media (max-width: 767px) {
            .news-ticker-wrapper {
                top: 10px; height: 38px;
            }
            .news-ticker {
                width: 94%; max-width: none; padding: 0 8px 0 12px; gap: 6px;
                border-radius: 20px; font-size: 12px;
            }
            .news-icon-area { font-size: 14px; }
            .news-text { font-size: 12px; }
            .news-spot-name { font-size: 9px; }
            .news-counter { font-size: 10px; }
            .news-list-btn { width: 28px; height: 28px; }
        }

        .news-icon-area { color: var(--color-accent); font-size: 18px; animation: pulse 2s infinite; flex-shrink: 0; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        .news-content-area { flex: 1; overflow: hidden; cursor: pointer; }
        .news-text { font-size: 13px; font-weight: bold; color: var(--color-text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .news-spot-name { font-size: 10px; color: var(--color-text-sub); }

        .news-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; white-space: nowrap; }
        .news-counter { font-size: 12px; color: var(--color-text-sub); font-family: monospace; }
        .news-list-btn {
            background: #f5f5f5; border: none; width: 32px; height: 32px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: #555; cursor: pointer; transition: background 0.2s;
        }
        .news-list-btn:hover { background: #eee; }

        /* ============================================================
           MARKERS
           ============================================================ */
        .custom-marker {
            width: 60px; height: 60px; cursor: pointer; z-index: 10;
        }
        @media (max-width: 767px) {
            .custom-marker { width: 44px; height: 44px; }
            .marker-emoji { font-size: 20px !important; }
        }
        .custom-marker.active { z-index: 100; }
        .marker-inner {
            width: 100%; height: 100%; background: #fff; border-radius: 50%;
            border: 3px solid var(--color-primary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            position: relative; overflow: visible;
            display: flex; justify-content: center; align-items: center;
            transform-origin: center bottom;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-color 0.2s, box-shadow 0.2s, border-width 0.2s;
        }
        .custom-marker.active .marker-inner {
            transform: scale(1.55);
            border-color: var(--color-accent);
            border-width: 4px;
            box-shadow: 0 0 0 4px rgba(255, 92, 56, 0.25), 0 6px 20px rgba(0, 0, 0, 0.4);
            animation: marker-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes marker-pop {
            0%   { transform: scale(1); }
            60%  { transform: scale(1.65); }
            100% { transform: scale(1.55); }
        }
        /* アクティブ時のリングエフェクト */
        .custom-marker.active .marker-inner::before {
            content: '';
            position: absolute; inset: -6px;
            border-radius: 50%;
            border: 3px solid var(--color-primary);
            animation: ring-pulse 1.4s ease-out infinite;
            z-index: -1;
        }
        @keyframes ring-pulse {
            0%   { opacity: 0.9; transform: scale(1); }
            100% { opacity: 0;   transform: scale(1.7); }
        }
        /* overflow: hidden は画像クリッピング用に内側の別要素で対応 */
        .marker-clip {
            position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
        }
        .floating { animation: float-safe 3s infinite ease-in-out; }
        @keyframes float-safe { 0%, 100% { margin-top: 0; } 50% { margin-top: -8px; } }
        .marker-image { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; }
        .marker-emoji { font-size: 28px; z-index: 1; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .status-badge { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; z-index: 5; display: none; }
        .marker-post-badge {
            position: absolute; top: -4px; right: -4px;
            width: 24px; height: 24px;
            background: linear-gradient(135deg, #FF7043, #E53935);
            border-radius: 50%;
            color: white; display: flex; justify-content: center;
            align-items: center; font-size: 11px; z-index: 8;
            border: 2.5px solid white;
            box-shadow: 0 2px 8px rgba(229, 57, 53, 0.55);
            animation: post-badge-pulse 2s ease-in-out infinite;
        }
        @keyframes post-badge-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 2px 8px rgba(229, 57, 53, 0.55); }
            50% { transform: scale(1.08); box-shadow: 0 3px 12px rgba(229, 57, 53, 0.75); }
        }

        /* クラスタ: 代表写真のまま右上に件数 */
        .custom-marker--cluster { cursor: pointer; }
        .marker-cluster-badge {
            position: absolute; top: -4px; right: -4px;
            min-width: 24px; height: 24px; padding: 0 6px;
            background: #fff; color: #1A3A4A;
            border-radius: 999px;
            font-size: 12px; font-weight: 700; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.28);
            z-index: 9; pointer-events: none;
        }
        @media (max-width: 767px) {
            .marker-cluster-badge {
                min-width: 20px; height: 20px; padding: 0 5px;
                font-size: 11px; top: -3px; right: -3px;
            }
        }
        /* クラスタ時: 件数（右上）と投稿（左上）を両立 */
        .custom-marker--cluster .marker-post-badge {
            top: -4px; left: -4px; right: auto;
        }
        @media (max-width: 767px) {
            .custom-marker--cluster .marker-post-badge {
                top: -3px; left: -3px;
            }
        }

        /* GPS 現在地 */
        .my-location-marker {
            width: 44px; height: 44px;
            display: flex; justify-content: center; align-items: flex-end;
            pointer-events: none;
        }
        .my-location-marker i {
            color: #FF5252; font-size: 38px; line-height: 1;
            filter: drop-shadow(0 2px 5px rgba(255,255,255,0.85));
        }

        /* ============================================================
           MAP CONTROLS (右下)
           ============================================================ */
        .map-controls {
            position: absolute; bottom: 30px; right: 20px; z-index: 35;
            display: flex; flex-direction: column; gap: 12px;
            pointer-events: auto; transition: all 0.3s ease;
        }
        .btn-control {
            width: 48px; height: 48px; border-radius: 50%; border: none;
            color: white; font-size: 20px; cursor: pointer;
            box-shadow: var(--shadow-soft);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-control:active { transform: scale(0.9); }
        .btn-gps   { background: linear-gradient(135deg, #FFAB91, #FF5722); }
        .btn-reset { background: linear-gradient(135deg, #80DEEA, #00ACC1); }

        /* ============================================================
           CARD PANEL
           ============================================================ */
        .card-panel-container { position: fixed; z-index: 40; transition: all 0.3s ease; pointer-events: none; }
        .card-panel-mobile-inner {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }
        .card-panel-handle {
            display: none;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 3px;
            width: 100%;
            padding: 8px 12px 6px;
            margin: 0;
            border: none;
            cursor: pointer;
            background: transparent;
            color: #888;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .card-panel-handle:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }
        .card-panel-handle-pill {
            width: 40px;
            height: 4px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.18);
        }
        .card-panel-handle > i {
            font-size: 12px;
            line-height: 1;
            transition: transform 0.3s ease;
        }
        body.cards-sheet-collapsed .card-panel-handle > i {
            transform: rotate(180deg);
        }
        .scroll-wrapper {
            display: flex; gap: 15px; pointer-events: auto;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .scroll-wrapper::-webkit-scrollbar { display: none; }

        /* --- スマホレイアウト --- */
        .card-panel-container {
            bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0) 100%);
            padding-bottom: 20px;
        }
        .scroll-wrapper {
            overflow-x: auto; scroll-snap-type: x mandatory;
            padding: 10px 20px 22px; align-items: stretch;
        }
        .slide-card {
            flex: 0 0 268px; min-height: 0; height: auto; background: white; border-radius: 20px;
            box-shadow: var(--shadow-soft); display: flex; flex-direction: column;
            overflow: hidden; scroll-snap-align: center;
            transition: all 0.3s; cursor: pointer;
            border: 2px solid transparent; position: relative;
        }
        @media (max-width: 767px) {
            .card-panel-container {
                /* ボトムナビ(約54px + safe-area)の上に配置 */
                bottom: calc(54px + env(safe-area-inset-bottom, 0px));
                padding-bottom: 0;
                background: none;
                pointer-events: none;
            }
            .card-panel-mobile-inner {
                pointer-events: auto;
                max-height: min(52vh, 380px);
                transition: max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1);

           ============================================================ */

        @media (min-width: 768px) {
            .sidebar-toggle-btn {
                display: flex;
                position: fixed;
                top: 50%;
                left: var(--sidebar-width);
                transform: translateY(-50%);
                width: 18px;
                height: 60px;
                background: white;
                border: 1px solid #eee;
                border-left: none;
                border-radius: 0 10px 10px 0;
                box-shadow: 3px 0 10px rgba(0,0,0,0.1);
                cursor: pointer;
                align-items: center;
                justify-content: center;
                color: var(--color-text-sub);
                font-size: 11px;
                z-index: 50;
                transition: left 0.3s ease, background 0.2s, color 0.2s;
                padding: 0;
            }
            .sidebar-toggle-btn:hover {
                background: var(--color-secondary);
                color: var(--color-primary);
            }
            .sidebar-toggle-btn i {
                transition: transform 0.3s ease;

            body.sidebar-collapsed .card-panel-container {
                transform: translateX(calc(-1 * var(--sidebar-width)));

                width: 100%;
            }
            body.sidebar-collapsed .news-ticker-wrapper {
                width: 100%;
                left: 0;
            }
            body.sidebar-collapsed .controls-container {
                left: 20px;
            }
            body.sidebar-collapsed .sidebar-toggle-btn {
                left: 0;
            }
            body.sidebar-collapsed .sidebar-toggle-btn i {
                transform: rotate(180deg);
            }
        }

        /* ============================================================
           MOBILE PANEL OVERLAY (パネル外タップで閉じる)
           ============================================================ */
        .ctrl-panel-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0;
            /* ボトムナビの手前で止めることで、ナビバーは常にタップ可能 */
            bottom: calc(54px + env(safe-area-inset-bottom, 0px));
            background: rgba(0,0,0,0.3); z-index: 150;
            touch-action: manipulation;
        }
        .ctrl-panel-overlay.open { display: block; }
        @media (min-width: 768px) {
            .ctrl-panel-overlay { display: none !important; }
        }

        /* ============================================================
           DATA REFRESH INDICATOR
           ============================================================ */
        #refresh-indicator {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: var(--bg-glass); border-radius: 20px; padding: 6px 14px;
            font-size: 11px; color: var(--color-text-sub); z-index: 25;
            box-shadow: var(--shadow-soft); pointer-events: none;
            opacity: 0; transition: opacity 0.4s;
        }
        #refresh-indicator.show { opacity: 1; }
        @media (max-width: 767px) {
            #refresh-indicator {
                bottom: calc(54px + env(safe-area-inset-bottom, 0px) + 74px);
            }
        }

        /* ============================================================
           NEWS TICKER — LIVE拡張
           ============================================================ */
        /* LIVE投稿があるとき ticker を少し広げてサムネを出す */
        .news-ticker.live-mode {
            gap: 8px;
            padding-right: 10px;
        }
        .ticker-live-thumb {
            width: 36px; height: 36px; border-radius: 8px;
            object-fit: cover; flex-shrink: 0;
            border: 2px solid #FF3B6B;
            cursor: pointer;
        }
        @media (max-width: 767px) {
            .ticker-live-thumb { width: 30px; height: 30px; }
        }
        .ticker-live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #FF3B6B; flex-shrink: 0;
            animation: live-pulse 1.5s ease-in-out infinite;
        }
        /* ニュース一覧モーダル — LIVE行 */
        .news-item-live-thumb {
            width: 48px; height: 48px; border-radius: 8px;
            object-fit: cover; flex-shrink: 0;
            border: 2px solid #FF3B6B; cursor: pointer;
        }
        .news-item-type-live { color: #FF3B6B; }
        .news-item-time { font-size: 11px; color: #aaa; margin-top: 2px; }

        /* ============================================================
           LIVE POST (LINEリアルタイム投稿)
           ============================================================ */
        .live-badge {
            display: inline-flex; align-items: center; gap: 3px;
            background: #2196F3; color: white;
            font-size: 9px; font-weight: bold; letter-spacing: 0.5px;
            padding: 2px 7px; border-radius: 4px;
            animation: live-pulse 1.5s ease-in-out infinite;
        }
        @keyframes live-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }
        .marker-live-badge {
            position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            background: #2196F3; color: white;
            font-size: 8px; font-weight: bold;
            padding: 1px 6px; border-radius: 3px;
            white-space: nowrap; z-index: 12;
            border: 1.5px solid white;
            animation: live-pulse 1.5s ease-in-out infinite;
            max-width: 62px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* LIVE マーカー: 頭＋下向き三角形で「ピン」のように立体感を出す（APNG も頭部に載せられる） */
        .custom-marker.custom-marker--live-pin {
            width: 64px;
            height: 78px;
            justify-content: flex-end;
            align-items: center;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 767px) {
            .custom-marker.custom-marker--live-pin {
                width: 50px;
                height: 62px;
            }
        }
        .marker-pin {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transform-origin: center bottom;
        }
        .marker-pin > .marker-inner,
        .marker-pin > .marker-inner-livepost {
            width: 54px;
            height: 54px;
            flex-shrink: 0;
            box-sizing: border-box;
            border-radius: 50%;
        }
        .marker-pin > .marker-inner-livepost {
            background: #fff;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        @media (max-width: 767px) {
            .marker-pin > .marker-inner,
            .marker-pin > .marker-inner-livepost {
                width: 42px;
                height: 42px;
            }
        }
        .marker-pin--floating {
            animation: marker-pin-float 3s ease-in-out infinite;
        }
        @keyframes marker-pin-float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-5px); }
        }
        .marker-pin-stem {
            width: 0;
            height: 0;
            margin-top: -5px;
            margin-bottom: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid var(--stem-color, #2196F3);
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.32));
            pointer-events: none;
        }
        @media (max-width: 767px) {
            .marker-pin-stem {
                margin-top: -4px;
                border-left-width: 8px;
                border-right-width: 8px;
                border-top-width: 12px;
            }
        }
        /* ラベルは丸い頭と地面アンカーのあいだ（茎の上部付近） */
        .custom-marker--live-pin .marker-live-badge {
            bottom: 18px;
            max-width: none;
            font-size: 8px;
            padding: 2px 7px;
        }
        @media (max-width: 767px) {
            .custom-marker--live-pin .marker-live-badge {
                bottom: 14px;
                font-size: 7px;
                padding: 1px 5px;
            }
        }
        .custom-marker--live-pin.active .marker-inner,
        .custom-marker--live-pin.active .marker-inner-livepost {
            transform: none;
            border-color: var(--color-accent);
            border-width: 4px;
            box-shadow: 0 0 0 4px rgba(255, 92, 56, 0.25), 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        .custom-marker--live-pin.active .marker-pin--floating {
            animation: none;
        }
        .custom-marker--live-pin.active .marker-pin {
            animation: marker-pin-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes marker-pin-pop {
            0%   { transform: scale(1); }
            60%  { transform: scale(1.5); }
            100% { transform: scale(1.38); }
        }
        .custom-marker--live-pin.active .marker-pin-stem {
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.35));
        }
        .live-standalone-marker:not(.custom-marker--live-pin) .marker-inner-livepost {
            width: 100%; height: 100%; border-radius: 50%; border-width: 3px;
            background: #fff; box-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .live-standalone-marker {
            width: 52px; height: 52px;
        }
        .live-standalone-marker.custom-marker--live-pin {
            width: 58px;
            height: 72px;
        }
        @media (max-width: 767px) {
            .live-standalone-marker.custom-marker--live-pin {
                width: 46px;
                height: 60px;
            }
            .live-standalone-marker:not(.custom-marker--live-pin) {
                width: 40px;
                height: 40px;
            }
        }
        .card-live-post {
            margin-top: 4px; padding: 5px 7px;
            background: #E3F2FD; border-radius: 7px;
            border-left: 3px solid #2196F3;
            pointer-events: none;
        }
        .card-live-post * { pointer-events: none; }
        /* 画像上に LIVE バッジがあるため、本文エリアはカテゴリ・時刻・1行プレビューのみ */
        .card-live-post--compact { margin-top: 4px; padding: 4px 7px; }
        .card-live-compact-meta {
            display: flex; align-items: baseline; gap: 6px; flex-wrap: nowrap;
            font-size: 9px; font-weight: bold; color: #1565C0;
            min-width: 0;
        }
        .card-live-cat { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-live-post--compact .card-live-message {
            font-size: 10px; color: #333;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1.25; margin-top: 2px;
        }
        .card-live-message {
            font-size: 11px; color: #333;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .card-live-time { font-size: 9px; color: #888; font-weight: normal; flex-shrink: 0; }
        .modal-live-post {
            margin: 0 0 16px; padding: 12px 14px;
            background: #E3F2FD; border-radius: 12px;
            border-left: 4px solid #2196F3;
        }
        .modal-live-post-header {
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        .modal-live-image {
            width: 100%; border-radius: 8px; cursor: pointer;
            max-height: 220px; object-fit: cover; display: block; margin-bottom: 8px;
        }
        .modal-live-message {
            font-size: 14px; color: #333; line-height: 1.6; white-space: pre-wrap;
        }
        .modal-live-time { font-size: 12px; color: #999; }
        /* ライトボックス */
        .lightbox-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 3000; display: none;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .lightbox-overlay.open { display: flex; }
        .lightbox-img {
            max-width: 95vw; max-height: 90vh;
            object-fit: contain; border-radius: 8px;
        }
    </style>
</head>

/**
 * 手動貼り付け（Drive 共有リンク）と AppSheet 画像列の両方を想定し、
 * <img> で表示しやすい URL に揃える。
 *
 * ※ drive.google.com/uc?export=view は 2024年以降クロスオリジン 403 が多発。
 *    代わりに /thumbnail?id=FILE_ID&sz=w800 を使う（<img> 埋め込みに対応）。
 *
 * 画像は Drive 側で「リンクを知っている全員が閲覧可」にしてください。
 */
function normalizeImageUrl(raw) {
    if (typeof raw !== 'string') return '';
    let s = raw.trim();
    if (!s) return '';
    if (!/^https?:\/\//i.test(s)) return '';

    // Google の url ラッパーを展開
    try {
        const u0 = new URL(s);
        if (u0.hostname === 'www.google.com' && u0.pathname === '/url') {
            const q = u0.searchParams.get('q');
            if (q && /^https?:\/\//i.test(q)) s = decodeURIComponent(q);
        }
    } catch (_) { /* ignore */ }

    // Drive ファイル ID を抽出するヘルパー
    const driveId = (() => {
        // /file/d/FILE_ID/
        const m1 = s.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (m1) return m1[1];
        // /thumbnail?id= または /uc?id= など
        try {
            const u = new URL(s);
            if (u.hostname === 'drive.google.com' || u.hostname === 'drive.usercontent.google.com') {
                const id = u.searchParams.get('id');
                if (id && /^[a-zA-Z0-9_-]+$/.test(id)) return id;
            }
        } catch (_) { /* ignore */ }
        return null;
    })();

    if (driveId) {
        // thumbnail エンドポイントは <img> クロスオリジンで 200 が返る
        return `https://drive.google.com/thumbnail?id=${driveId}&sz=w800`;
    }

    // lh3.googleusercontent.com 等（AppSheet が直接返す場合）はそのまま
    return s;
}

function timeAgo(date) {
    const diffMs = Date.now() - date.getTime();
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1)  return 'たった今';
    if (diffMin < 60) return `${diffMin}分前`;
    const diffH = Math.floor(diffMin / 60);
    if (diffH < 24)   return `${diffH}時間前`;
    return `${Math.floor(diffH / 24)}日前`;
}

/** gviz が返すセル値から Date に（Date() 文字列 / 配列 / シリアル日付 / ISO 等） */
function parseSheetDate(tsVal) {
    if (tsVal == null || tsVal === '') return null;
    if (tsVal instanceof Date && !isNaN(tsVal.getTime())) return tsVal;
    // gviz: [yyyy, mm0, dd, hh?, mi?, ss?] 月は 0 始まり
    if (Array.isArray(tsVal) && tsVal.length >= 3) {
        const y = Number(tsVal[0]);
        const m0 = Number(tsVal[1]);
        const d = Number(tsVal[2]);
        const h = tsVal.length > 3 ? Number(tsVal[3]) || 0 : 0;
        const mi = tsVal.length > 4 ? Number(tsVal[4]) || 0 : 0;
        const s = tsVal.length > 5 ? Number(tsVal[5]) || 0 : 0;
        const ts = new Date(y, m0, d, h, mi, s);
        return isNaN(ts.getTime()) ? null : ts;
    }
    let ts = null;
    if (typeof tsVal === 'string' && tsVal.startsWith('Date(')) {
        const parts = tsVal.slice(5, -1).split(',').map(Number);
        ts = new Date(parts[0], parts[1], parts[2], parts[3] || 0, parts[4] || 0, parts[5] || 0);
    } else if (typeof tsVal === 'number' && tsVal > 2000 && tsVal < 800000) {
        // スプレッドシートの日付シリアル（1900 系・小数は時刻）
        ts = new Date((tsVal - 25569) * 86400000);
    } else {
        ts = new Date(tsVal);
    }
    if (!ts || isNaN(ts.getTime())) return null;
    return ts;
}

/** マスタ・posts 双方で store_id キーを一致（日本語店舗名可・前後・連続空白のみ正規化） */
function normalizeStoreId_(raw) {
    if (raw == null || String(raw).trim() === '') return '';
    return String(raw).replace(/\s+/g, ' ').trim();
}

/** posts シート: createdAt 列が空・✔・TRUE のときも受け付ける */
function parsePostCreatedAt_(raw) {
    if (raw == null || raw === '') return new Date();
    const s = String(raw).trim();
    if (s === '✔' || s === '☑' || s.toUpperCase() === 'TRUE') return new Date();
    const d = parseSheetDate(raw);
    return d || new Date();
}

        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
