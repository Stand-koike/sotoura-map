// ================================================================
// DataModule — Google Sheets 取得・パース・ポーリング
//   列定義は config.js の COLS（エリアごとに変更可）
// ================================================================
const DataModule = {

    _fetchTimeout: null,
    _retryCount: 0,
    _maxRetries: 3,

    fetch() {
        this._retryCount = 0;
        this._doFetch();
    },

    _doFetch() {
        const cbName = '_gvizCb';
        const oldScript = document.getElementById('gviz-script');
        if (oldScript) oldScript.remove();

        clearTimeout(this._fetchTimeout);
        this._fetchTimeout = setTimeout(() => {
            console.warn('[DataModule] タイムアウト - リトライ', this._retryCount + 1);
            if (this._retryCount < this._maxRetries) {
                this._retryCount++;
                this._doFetch();
            } else {
                const retryEl = document.getElementById('loading-retry');
                if (retryEl) retryEl.style.display = 'block';
            }
        }, 12000);

        const script = document.createElement('script');
        script.id = 'gviz-script';
        script.src = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=responseHandler:${cbName}&_=${Date.now()}`;
        script.onerror = () => {
            console.warn('[DataModule] スクリプト読み込み失敗');
            clearTimeout(this._fetchTimeout);
            if (this._retryCount < this._maxRetries) {
                this._retryCount++;
                setTimeout(() => this._doFetch(), 2000 * this._retryCount);
            } else {
                const retryEl = document.getElementById('loading-retry');
                if (retryEl) retryEl.style.display = 'block';
            }
        };
        document.body.appendChild(script);
    },

    retryFetch() {
        const retryEl = document.getElementById('loading-retry');
        if (retryEl) retryEl.style.display = 'none';
        this.fetch();
    },

    onLoaded(json) {
        clearTimeout(this._fetchTimeout);
        const spots = DataModule._parse(json);

        const hash = spots.map(s =>
            `${s.id}|${s.status}|${s.news}|${s.url || ''}|${s.imageUrl || ''}|${s.imageUrl2 || ''}|${s.imageUrl3 || ''}|${s.address || ''}|${s.phone || ''}|${s.hours || ''}|${(s.tags || []).join('+')}`
        ).join(',');
        const loadingEl = document.getElementById('loading');
        const isInitialLoad = loadingEl && loadingEl.style.display !== 'none';
        if (hash === State.lastDataHash && !isInitialLoad) {
            DataModule._flashIndicator();
            return;
        }
        State.lastDataHash = hash;
        State.allSpots = spots;
        App._onDataReady();
        DataModule._flashIndicator();
    },

    _parse(json) {
        if (!json?.table?.rows) return [];
        const { COLS } = CONFIG;
        return json.table.rows.reduce((acc, row, i) => {
            if (!row?.c) return acc;
            const name = row.c[COLS.NAME]?.v;
            const lat  = row.c[COLS.LAT]?.v;
            const lng  = row.c[COLS.LNG]?.v;
            if (!name || lat == null || lng == null) return acc;
            const latN = Number(lat);
            const lngN = Number(lng);
            if (!Number.isFinite(latN) || !Number.isFinite(lngN)) return acc;
            // hidden 列が false/"FALSE" なら非表示
            if (row.c[COLS.HIDDEN]?.v === false || row.c[COLS.HIDDEN]?.v === 'FALSE') return acc;

            let url = row.c[COLS.URL]?.v || '';
            if (typeof url !== 'string' || !/^https?:\/\//i.test(url.trim())) url = '';
            else url = normalizeImageUrl(url);

            let url2 = row.c[COLS.IMAGE_URL_2]?.v || '';
            if (typeof url2 !== 'string' || !/^https?:\/\//i.test(url2.trim())) url2 = '';
            else url2 = normalizeImageUrl(url2);

            let url3 = row.c[COLS.IMAGE_URL_3]?.v || '';
            if (typeof url3 !== 'string' || !/^https?:\/\//i.test(url3.trim())) url3 = '';
            else url3 = normalizeImageUrl(url3);

            const storeIdRaw = row.c[COLS.STORE_ID]?.v;
            const storeId = storeIdRaw != null && String(storeIdRaw).trim() !== ''
                ? normalizeStoreId_(storeIdRaw)
                : '';
            const id = storeId ? `spot_${storeId.replace(/\s+/g, '_')}` : `spot_${i}`;

            const address   = row.c[COLS.ADDRESS]?.v   != null ? String(row.c[COLS.ADDRESS].v)   : '';
            const addressEn = row.c[COLS.ADDRESS_EN]?.v != null ? String(row.c[COLS.ADDRESS_EN].v) : '';
            const phone     = row.c[COLS.PHONE]?.v     != null ? String(row.c[COLS.PHONE].v)     : '';
            const phoneEn   = row.c[COLS.PHONE_EN]?.v   != null ? String(row.c[COLS.PHONE_EN].v)   : '';

            const _parseTags = (raw) => raw
                ? String(raw).split(/[,、]+/).map(t => t.replace(/^#\s*/, '').trim()).filter(Boolean)
                : [];
            const tags    = _parseTags(row.c[COLS.TAGS]?.v);
            const tagsEn  = _parseTags(row.c[COLS.TAGS_EN]?.v).length
                ? _parseTags(row.c[COLS.TAGS_EN]?.v) : tags;

            const hours   = row.c[COLS.HOURS]?.v   != null ? String(row.c[COLS.HOURS].v)   : '';
            const hoursEn = row.c[COLS.HOURS_EN]?.v != null ? String(row.c[COLS.HOURS_EN].v) : '';

            acc.push({
                id,
                storeId,
                coords:     [lngN, latN],
                emoji:      row.c[COLS.EMOJI]?.v   || '📍',
                imageUrl:   url,
                imageUrl2:  url2,
                imageUrl3:  url3,
                status:     row.c[COLS.STATUS]?.v  || '',
                name:       name,
                desc:       row.c[COLS.DESC]?.v    || '',
                category:   row.c[COLS.CAT]?.v     || 'Others',
                news:       row.c[COLS.NEWS]?.v    || '',
                url:        row.c[COLS.LINK_URL]?.v  || '',
                coupon:     row.c[COLS.COUPON]?.v  || '',
                name_en:    row.c[COLS.NAME_EN]?.v   || name,
                desc_en:    row.c[COLS.DESC_EN]?.v   || row.c[COLS.DESC]?.v   || '',
                category_en:row.c[COLS.CAT_EN]?.v   || row.c[COLS.CAT]?.v    || 'Others',
                status_en:  row.c[COLS.STATUS_EN]?.v != null ? String(row.c[COLS.STATUS_EN].v) : '',
                news_en:    row.c[COLS.NEWS_EN]?.v   || '',
                url_en:     row.c[COLS.LINK_URL_EN]?.v || row.c[COLS.LINK_URL]?.v || '',
                coupon_en:  row.c[COLS.COUPON_EN]?.v || row.c[COLS.COUPON]?.v || '',
                address,
                address_en: addressEn,
                phone,
                phone_en:   phoneEn,
                tags,
                tags_en:    tagsEn,
                hours,
                hours_en:   hoursEn
            });
            return acc;
        }, []);
    },

    // 30秒ポーリング開始（AppSheet でデータ更新後に自動反映）
    startPolling() {
        if (!CONFIG.POLL_INTERVAL) return;
        clearInterval(State.pollInterval);
        State.pollInterval = setInterval(() => DataModule.fetch(), CONFIG.POLL_INTERVAL);
    },

    _flashIndicator() {
        const el = document.getElementById('refresh-indicator');
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1800);
    }
};

// JSONP コールバックをグローバルに公開（ドット付き名前は一部ブラウザで問題があるため単純名を使用）
window._gvizCb = function(json) {
    clearTimeout(DataModule._fetchTimeout);
    DataModule.onLoaded(json);
};

// ================================================================
// PostsModule — LIVE投稿（posts シート）取得・ピン統合・ポーリング
// ================================================================
const PostsModule = {

    _fetchTimeout: null,

    fetch() {
        const cbName = '_gvizPostsCb';
        const oldScript = document.getElementById('gviz-posts-script');
        if (oldScript) oldScript.remove();

        clearTimeout(this._fetchTimeout);
        this._fetchTimeout = setTimeout(() => {
            console.warn('[PostsModule] タイムアウト');
        }, 12000);

        const script = document.createElement('script');
        script.id = 'gviz-posts-script';
        const sheetParam = encodeURIComponent(CONFIG.POSTS_SHEET || 'posts');
        script.src =
            `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=responseHandler:${cbName}&sheet=${sheetParam}&_=${Date.now()}`;
        script.onerror = () => {
            clearTimeout(this._fetchTimeout);
            console.warn('[PostsModule] posts シート取得失敗');
        };
        document.body.appendChild(script);
    },

    onLoaded(json) {
        clearTimeout(this._fetchTimeout);
        const { postsByStoreId, liveStandalonePosts } = this._parse(json);
        const hash = JSON.stringify(postsByStoreId);
        if (hash === State.lastPostsHash) return;
        State.lastPostsHash = hash;

        State.postsByStoreId = postsByStoreId;
        State.liveStandalonePosts = liveStandalonePosts;

        PostsModule._attachLiveToSpots();

        App._refreshUI();

        if (State.currentSpot && document.getElementById('modal-overlay')?.classList.contains('open')) {
            UIModule.openModal(State.currentSpot.id);
        }
    },

    _attachLiveToSpots() {
        const COORD_EPS = 0.00005; // 約5m — store_id 不一致時の座標フォールバック
        const fixedPosts = Object.values(State.postsByStoreId);

        State.allSpots.forEach(spot => {
            const sid = (spot.storeId || '').trim();
            if (sid && State.postsByStoreId[sid]) {
                spot.livePost = State.postsByStoreId[sid];
                return;
            }
            const [lng, lat] = spot.coords;
            spot.livePost = fixedPosts.find(p =>
                p.sourceType === LINE_SOURCE.FIXED &&
                p.lat != null && p.lng != null &&
                Math.abs(Number(p.lat) - lat) < COORD_EPS &&
                Math.abs(Number(p.lng) - lng) < COORD_EPS
            ) || null;
        });
    },

    /**
     * 列: postId userId role sourceType title text imageUrl lat lng storeId createdAt isVisible
     */
    _parse(json) {
        const postsByStoreId = {};
        const mobileList = [];

        const buckets = {}; // dedupキーごと最新1件

        if (!json?.table?.rows) return { postsByStoreId, liveStandalonePosts: mobileList };

        json.table.rows.forEach(row => {
            if (!row?.c) return;
            if (!isPostVisible_(row)) return;

            const title = row.c[POSTS_COL.TITLE]?.v != null ? String(row.c[POSTS_COL.TITLE].v).trim() : '';
            const text = row.c[POSTS_COL.TEXT]?.v != null ? String(row.c[POSTS_COL.TEXT].v).trim() : '';
            const rawImg = row.c[POSTS_COL.IMAGE_URL]?.v != null ? String(row.c[POSTS_COL.IMAGE_URL].v).trim() : '';
            const imageUrl = rawImg ? normalizeImageUrl(rawImg) : '';
            if (!title && !text && !imageUrl) return;

            const role = row.c[POSTS_COL.ROLE]?.v != null ? String(row.c[POSTS_COL.ROLE].v).trim().toLowerCase() : '';
            const sourceType = row.c[POSTS_COL.SOURCE_TYPE]?.v != null
                ? String(row.c[POSTS_COL.SOURCE_TYPE].v).trim().toLowerCase() : '';

            let lat = row.c[POSTS_COL.LAT]?.v;
            let lng = row.c[POSTS_COL.LNG]?.v;
            lat = lat != null && lat !== '' ? Number(lat) : null;
            lng = lng != null && lng !== '' ? Number(lng) : null;

            const createdAt = parsePostCreatedAt_(row.c[POSTS_COL.CREATED_AT]?.v);

            const storeId = normalizeStoreId_(row.c[POSTS_COL.STORE_ID]?.v);

            const post = {
                postId:     row.c[POSTS_COL.POST_ID]?.v != null ? String(row.c[POSTS_COL.POST_ID].v) : '',
                userId:     row.c[POSTS_COL.USER_ID]?.v != null ? String(row.c[POSTS_COL.USER_ID].v) : '',
                role,
                sourceType,
                title,
                message: text,
                imageUrl,
                lat,
                lng,
                storeId,
                timestamp:  createdAt
            };

            let dedupKey;
            if (sourceType === LINE_SOURCE.FIXED && storeId) {
                dedupKey = `f_${storeId}`;
            } else if (lat != null && lng != null && !isNaN(lat) && !isNaN(lng)) {
                dedupKey = `m_${roundCoord5(lat)}_${roundCoord5(lng)}`;
            } else return;

            const prev = buckets[dedupKey];
            if (!prev || createdAt.getTime() > prev.timestamp.getTime())
                buckets[dedupKey] = post;
        });

        Object.values(buckets).forEach(p => {
            if (p.sourceType === LINE_SOURCE.FIXED && p.storeId) {
                const sid = p.storeId;
                const cur = postsByStoreId[sid];
                if (!cur || p.timestamp.getTime() > cur.timestamp.getTime()) {
                    postsByStoreId[sid] = {
                        timestamp:  p.timestamp,
                        title:      p.title,
                        message:    p.message,
                        imageUrl:   p.imageUrl,
                        role:       p.role,
                        sourceType: p.sourceType,
                        lat:        p.lat,
                        lng:        p.lng
                    };
                }
                return;
            }
            if (p.sourceType === LINE_SOURCE.GPS || p.sourceType === LINE_SOURCE.SELECTED) {
                mobileList.push(p);
            }
        });

        mobileList.sort((a, b) => b.timestamp - a.timestamp);
        return { postsByStoreId, liveStandalonePosts: mobileList };
    },

    startPolling() {
        if (!CONFIG.LIVE_POST_POLL_INTERVAL) return;
        clearInterval(State.livePostPollInterval);
        State.livePostPollInterval =
            setInterval(() => PostsModule.fetch(), CONFIG.LIVE_POST_POLL_INTERVAL);
    }
};

window._gvizPostsCb = function(json) {
    clearTimeout(PostsModule._fetchTimeout);
    PostsModule.onLoaded(json);
};

// ================================================================
// LayerManager — レイヤー管理
// ================================================================
const LayerManager = {

    // レイヤー定義
    // type: 'markers'          → Mapbox HTML マーカー群
    //       'geojson-line'     → GeoJSON LineString レイヤー
    //       'geojson-fill'     → GeoJSON Polygon レイヤー
    _defs: {
        spots: {
            name:    '店舗ピン',
            name_en: 'Spots',
            icon:    '📍',
            color:   '#00897B',
            visible: true,
            type:    'markers'
        },
    },

    // マップロード後に初期化
    init(map) {
        this._map = map;
    },

    _registerGeoJSON(id, layerOpt) {
        const def = this._defs[id];
        if (!def?.data) return;
        this._map.addSource(id, { type: 'geojson', data: def.data });
        this._map.addLayer({
            id:     `${id}-layer`,
            type:   layerOpt.type,
            source: id,
            paint:  layerOpt.paint,
            layout: { visibility: def.visible ? 'visible' : 'none' }
        });
    },

    // レイヤーの表示/非表示をトグル
    toggle(id) {
        const def = this._defs[id];
        if (!def) return;
        def.visible = !def.visible;

        if (def.type === 'markers') {
            State.activeMarkers.forEach(m => {
                m.getElement().style.display = def.visible ? '' : 'none';
            });
            if (CONFIG.ENABLE_STANDALONE_LIVE_PINS) {
                State.liveMarkers.forEach(m => {
                    m.getElement().style.display = def.visible ? '' : 'none';
                });
            }
            if (def.visible) UIModule.syncMarkerDisplay();
        } else {
            const layerId = `${id}-layer`;
            if (this._map?.getLayer(layerId)) {
                this._map.setLayoutProperty(layerId, 'visibility', def.visible ? 'visible' : 'none');
            }
        }
        UIModule.renderLayerPanel();
    },

    // 新レイヤーを動的追加（将来の拡張エントリポイント）
    add(id, def) {
        this._defs[id] = def;
        if (def.type === 'geojson-line') {
            this._registerGeoJSON(id, { type: 'line', paint: { 'line-color': def.color, 'line-width': 4 } });
        } else if (def.type === 'geojson-fill') {
            this._registerGeoJSON(id, { type: 'fill', paint: { 'fill-color': def.color, 'fill-opacity': 0.25 } });
        }
        UIModule.renderLayerPanel();
    },

    // GeoJSON データを更新（将来の拡張エントリポイント）
    setData(id, geojson) {
        this._map?.getSource(id)?.setData(geojson);
    },

    getDefs() { return this._defs; }
};

// ================================================================
// ClusterModule — 画面ピクセル距離でクラスタ → HTML 代表写真＋件数バッジ
// （Mapbox querySourceFeatures はレイヤー無し GeoJSON で空になるため自前集計）
// ================================================================
const ClusterModule = {
    _map:       null,
    _mapBound:  false,

    _cfg() {
        return CONFIG.CLUSTER || {};
    },

    isEnabled() {
        return this._cfg().enabled !== false;
    },

    maxZoom() {
        const z = Number(this._cfg().clusterMaxZoom);
        return Number.isFinite(z) ? z : 17;
    },

    radiusPx() {
        const r = Number(this._cfg().clusterRadius);
        return Number.isFinite(r) && r > 0 ? r : 65;
    },

    minPoints() {
        const n = Number(this._cfg().clusterMinPoints);
        return Number.isFinite(n) && n >= 2 ? n : 2;
    },

    usesClusterView() {
        if (!this.isEnabled() || !this._map) return false;
        return this._map.getZoom() <= this.maxZoom();
    },

    init(map) {
        if (!this.isEnabled() || !map) return;
        this._map = map;
        if (this._mapBound) return;
        this._mapBound = true;
        const refresh = () => UIModule.syncMarkerDisplay();
        map.on('zoomend', refresh);
        map.on('moveend', refresh);
    },

    /** クラスタ内の代表スポット（画像ありを優先） */
    _pickRepresentative(members) {
        let fallback = null;
        for (let i = 0; i < members.length; i++) {
            const spot = members[i];
            if (spot?.imageUrl) return spot;
            if (!fallback && spot) fallback = spot;
        }
        return fallback || members[0] || null;
    },

    /**
     * 現在のズーム・画面投影で spots をクラスタ／単独に分割
     * @returns {{ clusters: {members, count, coords, rep}[], singles: object[] }}
     */
    computeGroups(spots) {
        const map = this._map;
        const list = spots || [];
        if (!map || !list.length) return { clusters: [], singles: list };

        const radius = this.radiusPx();
        const minPts = this.minPoints();
        const r2 = radius * radius;
        const n = list.length;
        const used = new Uint8Array(n);
        const clusters = [];

        for (let i = 0; i < n; i++) {
            if (used[i]) continue;
            const pi = map.project(list[i].coords);
            const group = [i];

            for (let j = i + 1; j < n; j++) {
                if (used[j]) continue;
                const pj = map.project(list[j].coords);
                const dx = pi.x - pj.x;
                const dy = pi.y - pj.y;
                if (dx * dx + dy * dy <= r2) group.push(j);
            }

            if (group.length < minPts) continue;

            group.forEach(idx => { used[idx] = 1; });
            const members = group.map(idx => list[idx]);
            let sx = 0;
            let sy = 0;
            members.forEach(s => {
                sx += s.coords[0];
                sy += s.coords[1];
            });
            clusters.push({
                members,
                count:       members.length,
                coords:      [sx / members.length, sy / members.length],
                rep:         this._pickRepresentative(members),
                hasLivePost: members.some(s => s.livePost)
            });
        }

        const singles = [];
        for (let i = 0; i < n; i++) {
            if (!used[i]) singles.push(list[i]);
        }
        return { clusters, singles };
    },

    expandCluster(coords) {
        const map = this._map;
        if (!map) return;
        const target = Math.min(
            Math.max(map.getZoom() + 2, this.maxZoom() + 0.5),
            map.getMaxZoom()
        );
        map.easeTo({
            center: coords,
            zoom:   target,
            bearing: MapModule._cameraLock().bearing,
            pitch:   MapModule._cameraLock().pitch
        });
    },

    /** ズーム ≤ clusterMaxZoom 時: 代表写真＋件数の HTML マーカーを描画 */
    renderHtmlMarkers(spots, spotsVisible) {
        if (!this.isEnabled() || !this._map || !spotsVisible) return;

        const { clusters, singles } = this.computeGroups(spots);

        singles.forEach(spot => UIModule._appendSpotHtmlMarker(spot, true));

        clusters.forEach(c => {
            if (!c.rep) return;
            UIModule._appendClusterHtmlMarker(c.rep, c.count, c.coords, c.hasLivePost);
        });
    }
};

/** JST の暦・年月日（数値） */
function getJstYmdParts(d) {
    const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Tokyo',
        year:     'numeric',
        month:    '2-digit',
        day:      '2-digit'
    }).formatToParts(d);
    const o = {};
    for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        if (p.type === 'year' || p.type === 'month' || p.type === 'day') o[p.type] = +p.value;
    }
    return { y: o.year, m: o.month, d: o.day };
}

/** JST のその暦日 12:00 に対応する UTC の Date（SunCalc.getTimes 用） */
function jstCalendarNoonUtcDate(y, m, day) {
    return new Date(Date.UTC(y, m - 1, day, 3, 0, 0));
}

/**
 * イラスト切替フェーズ（CONFIG.MAP_IMAGE + SunCalc）
 * day | sunset | night
 */
function getIllustrationPhase(now, cfg) {
    if (typeof SunCalc === 'undefined' || !cfg) return 'day';
    const lat = cfg.solarLat != null ? Number(cfg.solarLat) : cfg.center[1];
    const lng = cfg.solarLng != null ? Number(cfg.solarLng) : cfg.center[0];
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return 'day';

    let tt;
    try {
        const { y, m, d } = getJstYmdParts(now);
        tt = SunCalc.getTimes(jstCalendarNoonUtcDate(y, m, d), lat, lng);
    } catch (e) {
        return 'day';
    }

    if (!tt?.sunset || !tt?.dawn) return 'day';

    const preMin = Number(cfg.sunsetPreheatMinutes);
    const preMs = (Number.isFinite(preMin) ? preMin : 45) * 60000;
    const sunsetStart = tt.sunset.getTime() - preMs;

    const duskKey = cfg.duskBand === 'civil' ? 'dusk' : 'nauticalDusk';
    const tEveningEnd = tt[duskKey];
    if (!(tEveningEnd instanceof Date) || isNaN(tEveningEnd.getTime())) return 'day';
    const eveningEnd = tEveningEnd.getTime();

    const dawn = tt.dawn.getTime();
    const tMs = now.getTime();
    if (tMs >= dawn && tMs < sunsetStart) return 'day';
    if (tMs >= sunsetStart && tMs < eveningEnd) return 'sunset';
    return 'night';
}

/** イラスト URL に cacheVersion を付与（blob: / data: はそのまま） */
function illustrationUrlWithCacheBust(url) {
    if (!url) return url;
    const s = String(url);
    if (s.indexOf('blob:') === 0 || s.indexOf('data:') === 0) return url;
    const cfg = CONFIG.MAP_IMAGE || {};
    const v = cfg.cacheVersion != null && cfg.cacheVersion !== ''
        ? String(cfg.cacheVersion)
        : String(Date.now());
    const sep = s.includes('?') ? '&' : '?';
    return `${s}${sep}v=${encodeURIComponent(v)}`;
}

/** file:// 用: 画像→canvas→blob URL（未完了時は timeoutMs 後に元 URL で返す） */
function illustrationImageToBlobUrl(url, timeoutMs) {
    const fetchUrl = illustrationUrlWithCacheBust(url);
    const limit = Number(timeoutMs);
    const ms = Number.isFinite(limit) && limit > 0 ? limit : 12000;
    return new Promise(resolve => {
        let settled = false;
        const finish = (v) => {
            if (settled) return;
            settled = true;
            clearTimeout(tid);
            resolve(v);
        };
        const tid = setTimeout(() => {
            console.warn('[MapModule] illustration blob 化タイムアウト — 元 URL を使用', url);
            finish(url);
        }, ms);
        const img = new Image();
        img.onload = () => {
            try {
                const c = document.createElement('canvas');
                c.width = img.naturalWidth;
                c.height = img.naturalHeight;
                c.getContext('2d').drawImage(img, 0, 0);
                c.toBlob(blob => finish(blob ? URL.createObjectURL(blob) : url));
            } catch (e) {
                finish(url);
            }
        };
        img.onerror = () => finish(url);
        img.src = fetchUrl;
    });
}

// ================================================================
// MapModule — マップ初期化・イラストマップ表示・GPS
//   イラスト昼夜夕: MAP_IMAGE + SunCalc。キャッシュは cacheVersion で bust
// ================================================================
const MapModule = {
    _map: null,

    _loaded: false,

    _illustrationTimer:           null,
    _illustrationVisibilityBound: null,
    _orientationLocked:           false,
    _lockedBearing:               null,
    _lockedPitch:                 null,
    _resizeConstraintTimer:       null,
    _resetAnimTimer:              null,
    _lastContainerSize:           null,
    _initViewApplied:             false,

    _cameraLock() {
        const cfg = CONFIG.MAP_IMAGE || {};
        const bearing = this._lockedBearing != null
            ? this._lockedBearing
            : (Number.isFinite(Number(cfg.bearing)) ? Number(cfg.bearing) : -90);
        const pitch = this._lockedPitch != null
            ? this._lockedPitch
            : (Number.isFinite(Number(cfg.pitch)) ? Number(cfg.pitch) : 45);
        return { bearing, pitch };
    },

    _illustrationFitPadding() {
        return State.isPC
            ? { top: 150, bottom: 16, left: 16, right: 16 }
            : { top: 90, bottom: 230, left: 16, right: 16 };
    },

    /** minZoom 算出専用（パディング 0 でイラスト端 = 画面端） */
    _illustrationMinZoomPadding() {
        return { top: 0, bottom: 0, left: 0, right: 0 };
    },

    _illustrationBoundsPair() {
        const coords = CONFIG.MAP_IMAGE.coordinates;
        const [[w, n], , [e, s]] = coords;
        return [[w, s], [e, n]];
    },

    _initViewBoundsPair() {
        const coords = CONFIG.MAP_IMAGE.initViewCoordinates;
        if (!Array.isArray(coords) || coords.length < 4) return null;
        const [[w, n], , [e, s]] = coords;
        return [[w, s], [e, n]];
    },

    _minZoomViewBoundsPair() {
        const coords = CONFIG.MAP_IMAGE.minZoomViewCoordinates || CONFIG.MAP_IMAGE.coordinates;
        if (!Array.isArray(coords) || coords.length < 4) return this._illustrationBoundsPair();
        const [[w, n], , [e, s]] = coords;
        return [[w, s], [e, n]];
    },

    _minZoomViewPadding() {
        const p = CONFIG.MAP_IMAGE.minZoomViewPadding;
        if (!p || typeof p !== 'object') return this._illustrationMinZoomPadding();
        if (State.isPC) {
            return {
                top:    p.top    != null ? p.top    : 150,
                bottom: p.bottom != null ? p.bottom : 16,
                left:   p.left   != null ? p.left   : 16,
                right:  p.right  != null ? p.right  : 16
            };
        }
        return {
            top:    p.top    != null ? p.top    : 90,
            bottom: p.mobileBottom != null ? p.mobileBottom : (p.bottom != null ? p.bottom : 240),
            left:   p.left   != null ? p.left   : 16,
            right:  p.right  != null ? p.right  : 16
        };
    },

    _initViewPadding() {
        const p = CONFIG.MAP_IMAGE.initViewPadding;
        if (!p || typeof p !== 'object') return this._illustrationFitPadding();
        if (State.isPC) return p;
        return {
            top:    p.top    != null ? p.top    : 60,
            bottom: p.mobileBottom != null ? p.mobileBottom : 160,
            left:   p.left   != null ? p.left   : 30,
            right:  p.right  != null ? p.right  : 30
        };
    },

    _initViewOffset() {
        const o = CONFIG.MAP_IMAGE.initViewOffset;
        if (Array.isArray(o) && o.length >= 2) {
            return [Number(o[0]) || 0, Number(o[1]) || 0];
        }
        return this._illustrationFitOffset();
    },

    _illustrationFitOffset() {
        const cfg = CONFIG.MAP_IMAGE || {};
        const x = Number(cfg.seaFitOffsetX);
        const y = Number(cfg.seaFitOffsetY);
        return [
            Number.isFinite(x) ? x : 0,
            Number.isFinite(y) ? y : 0
        ];
    },

    _minZoomTighten() {
        const v = Number(CONFIG.MAP_IMAGE?.minZoomTighten);
        const base = Number.isFinite(v) ? v : 0;
        const buf = Number(CONFIG.MAP_IMAGE?.minZoomOutBuffer);
        return base + (Number.isFinite(buf) ? buf : 0);
    },

    _resolveInitZoom(cfg) {
        cfg = cfg || CONFIG.MAP_IMAGE || {};
        const base = Number(cfg.initZoom);
        const fallback = Number.isFinite(base) && base > 0 ? base : 16;
        if (State.isPC) return fallback;
        const mobile = Number(cfg.initZoomMobile);
        return Number.isFinite(mobile) && mobile > 0 ? mobile : fallback;
    },

    _resolveMinZoomFloor(cfg) {
        cfg = cfg || CONFIG.MAP_IMAGE || {};
        const pick = (v) => (Number.isFinite(v) && v > 0 ? v : null);
        if (State.isPC) return pick(Number(cfg.minZoom));
        return pick(Number(cfg.minZoomMobile)) ?? pick(Number(cfg.minZoom));
    },

    _resolveInitCenter(cfg) {
        cfg = cfg || CONFIG.MAP_IMAGE || {};
        const fallback = (Array.isArray(cfg.initCenter) && cfg.initCenter.length >= 2)
            ? cfg.initCenter
            : cfg.center;
        if (State.isPC) return fallback;
        const mobile = cfg.initCenterMobile;
        if (Array.isArray(mobile) && mobile.length >= 2) {
            return [Number(mobile[0]), Number(mobile[1])];
        }
        return fallback;
    },

    _resolveInitViewOffset(cfg) {
        cfg = cfg || CONFIG.MAP_IMAGE || {};
        if (!State.isPC) {
            const o = cfg.initViewOffsetMobile;
            if (Array.isArray(o) && o.length >= 2) {
                return [Number(o[0]) || 0, Number(o[1]) || 0];
            }
        }
        return this._initViewOffset();
    },

    /** maxBounds・回転禁止・ピッチ固定。recalcMinZoom=true のときだけ minZoom を fit 再計算 */
    _applyMapConstraints(opts = {}) {
        const map = this._map;
        const cfg = CONFIG.MAP_IMAGE;
        if (!map || !cfg) return;

        const cam = this._cameraLock();
        this._lockedBearing = cam.bearing;
        this._lockedPitch = cam.pitch;

        if (cfg.maxBounds) map.setMaxBounds(cfg.maxBounds);
        if (map.dragRotate) map.dragRotate.disable();
        if (map.touchZoomRotate) map.touchZoomRotate.disableRotation();
        map.setMinPitch(cam.pitch);
        map.setMaxPitch(cam.pitch);

        if (!this._orientationLocked) {
            this._orientationLocked = true;
            const snapOrientation = () => {
                if (!this._map) return;
                const lock = this._cameraLock();
                if (Math.abs(this._map.getBearing() - lock.bearing) > 0.05) {
                    this._map.setBearing(lock.bearing);
                }
                if (Math.abs(this._map.getPitch() - lock.pitch) > 0.05) {
                    this._map.setPitch(lock.pitch);
                }
            };
            map.on('rotate', snapOrientation);
            map.on('pitch', snapOrientation);
        }

        if (opts.recalcMinZoom !== false) {
            this._updateMinZoomFromIllustration();
        }
    },

    _syncContainerSize() {
        if (!this._map) return null;
        const el = this._map.getContainer();
        const size = { w: el.clientWidth, h: el.clientHeight };
        this._lastContainerSize = size;
        return size;
    },

    _containerSizeChanged() {
        if (!this._map) return false;
        const el = this._map.getContainer();
        const w = el.clientWidth;
        const h = el.clientHeight;
        const prev = this._lastContainerSize;
        if (!prev || prev.w !== w || prev.h !== h) {
            this._lastContainerSize = { w, h };
            return true;
        }
        return false;
    },

    /** ズームアウト下限を cameraForBounds で算出（カメラ位置は変えない） */
    _updateMinZoomFromIllustration() {
        const map = this._map;
        if (!map) return;
        const cfg = CONFIG.MAP_IMAGE;
        const cam = this._cameraLock();
        const camera = map.cameraForBounds(this._minZoomViewBoundsPair(), {
            padding:  this._minZoomViewPadding(),
            bearing:  cam.bearing,
            pitch:    cam.pitch,
            maxZoom:  cfg.maxZoom ?? 22
        });
        if (!camera) return;
        const fitMinZ = camera.zoom + this._minZoomTighten();
        const floorMinZ = this._resolveMinZoomFloor(cfg);
        const initZ = this._resolveInitZoom(cfg);
        let minZ = floorMinZ != null
            ? Math.max(fitMinZ, floorMinZ)
            : fitMinZ;
        /* initZoom から大きく離れないよう上限（ズームアウト過多を防止） */
        if (Number.isFinite(initZ) && initZ > 0) {
            minZ = Math.max(minZ, initZ - 0.5);
        }
        map.setMinZoom(minZ);
    },

    _fitIllustrationBounds(opts = {}) {
        if (!this._map) return;
        const cam = this._cameraLock();
        this._map.fitBounds(this._illustrationBoundsPair(), {
            padding:  this._illustrationFitPadding(),
            offset:   this._illustrationFitOffset(),
            bearing:  cam.bearing,
            pitch:    cam.pitch,
            duration: opts.duration != null ? opts.duration : 0,
            maxZoom:  CONFIG.MAP_IMAGE.maxZoom ?? 22
        });
    },

    /** 起動時表示を適用（initCenter + initZoom で直接指定） */
    _applyInitView(opts = {}) {
        if (!this._map) return;
        const cfg = CONFIG.MAP_IMAGE;
        const cam = this._cameraLock();
        const minZ = this._map.getMinZoom();

        const center = this._resolveInitCenter(cfg);
        const zoom = Math.max(this._resolveInitZoom(cfg), minZ);
        const offset = this._resolveInitViewOffset(cfg);
        const duration = opts.duration != null ? opts.duration : 0;

        if (duration > 0) {
            this._map.easeTo({ center, zoom, bearing: cam.bearing, pitch: cam.pitch, offset, duration });
        } else {
            this._map.jumpTo({ center, zoom, bearing: cam.bearing, pitch: cam.pitch, offset });
        }
    },

    /** イラスト読込・リサイズ後: minZoom 再計算 → 初期表示 */
    _finalizeInitView(opts = {}) {
        if (!this._map) return;
        this._map.resize();
        this._applyMapConstraints({ recalcMinZoom: true });
        this._applyInitView(opts);
        this._initViewApplied = true;
    },

    /** @deprecated _applyInitView を使用 */
    _fitInitView(opts = {}) {
        this._applyInitView(opts);
    },

    /** マップリセット: 起動時と同じ初期表示（外浦湾エリア）へ戻す */
    resetView() {
        if (!this._map) return;
        if (this._resetAnimTimer) clearTimeout(this._resetAnimTimer);
        try { this._map.stop(); } catch (e) { /* 移動中でなければ無視 */ }
        this._resetAnimTimer = setTimeout(() => {
            if (!this._map) return;
            this._map.resize();
            this._map.once('moveend', () => {
                if (typeof UIModule !== 'undefined' && UIModule.syncMarkerDisplay) {
                    UIModule.syncMarkerDisplay();
                }
            });
            this._applyInitView({ duration: 800 });
        }, 0);
    },

    init() {
        const token = CONFIG.MAPBOX_TOKEN || '';
        if (!token || token.includes('YOUR_')) {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'block';
                loading.innerHTML =
                    'Mapbox トークン未設定。<code>web/secrets.local.js</code> に <code>MAPBOX_TOKEN</code>（pk.*）を設定し、' +
                    '<code>web/</code> をドキュメントルートにして開いてください（例: <code>cd web &amp;&amp; python -m http.server 8080</code>）。';
            }
            console.error('[MapModule] MAPBOX_TOKEN が未設定です。secrets.example.js → secrets.local.js を参照。');
            return;
        }
        mapboxgl.accessToken = token;
        const { center, minZoom, maxZoom, bearing = -90, pitch = 45 } = CONFIG.MAP_IMAGE;
        const initZoom = this._resolveInitZoom(CONFIG.MAP_IMAGE);

        this._lockedBearing = Number.isFinite(Number(bearing)) ? Number(bearing) : -90;
        this._lockedPitch = Number.isFinite(Number(pitch)) ? Number(pitch) : 45;

        this._map = new mapboxgl.Map({
            container: 'map',
            /* 空スタイルは既定で黒背景 → イラスト外周に合わせた background レイヤーを最背面に置く */
            style: {
                version: 8,
                sources: {},
                layers:  [{
                    id:     'illustration-sky-bg',
                    type:   'background',
                    paint:  { 'background-color': '#A8D8E8' }
                }]
            },
            center:           center,
            zoom:             initZoom,
            minZoom:          minZoom,
            maxZoom:          maxZoom,
            bearing:          this._lockedBearing,
            pitch:            this._lockedPitch,
            minPitch:         this._lockedPitch,
            maxPitch:         this._lockedPitch,
            dragRotate:       false,
            pitchWithRotate:  false,
            touchPitchRotate: false,
            antialias:        true
        });
        State.map = this._map;

        const onMapReady = () => {
            if (this._loaded) return;
            this._loaded = true;

            try {
                LayerManager.init(this._map);
                ClusterModule.init(this._map);
                this._syncContainerSize();
                this._map.resize();
                this._applyMapConstraints({ recalcMinZoom: false });
            } catch (e) {
                console.error('[MapModule] レイヤー初期化エラー:', e);
            }
            DataModule.fetch();
            DataModule.startPolling();
            this._startGPS();

            Promise.resolve(this._addIllustrationMap())
                .catch((e) => {
                    console.error('[MapModule] イラストレイヤ読込:', e);
                    return this._addIllustrationMapDayFallback();
                })
                .then(() => {
                    this._finalizeInitView({ duration: 0 });
                })
                .catch((e2) => console.error('[MapModule] イラスト昼フォールバック失敗:', e2));
        };

        this._map.on('load', onMapReady);

        this._map.on('error', (e) => {
            console.warn('[MapModule] マップエラー:', e.error?.message || e);
            if (!this._loaded) onMapReady();
        });

        setTimeout(() => {
            if (!this._loaded) {
                console.warn('[MapModule] load タイムアウト — 強制的にデータ取得を開始');
                onMapReady();
            } else if (this._map && !this._initViewApplied) {
                this._finalizeInitView({ duration: 0 });
            }
        }, 8000);

        this._map.on('click', () => {
            UIModule.closePanelOverlay();
        });

        window.addEventListener('resize', () => {
            const pc = window.innerWidth >= 768;
            if (State.isPC !== pc) {
                State.isPC = pc;
                if (pc) document.body.classList.remove('cards-sheet-collapsed');
                setTimeout(() => {
                    this._map.resize();
                    this._applyMapConstraints();
                    if (State.allSpots.length > 0) this.fitBounds();
                }, 310);
            }
        });

        window.addEventListener('resize', () => {
            if (!this._map) return;
            clearTimeout(this._resizeConstraintTimer);
            this._resizeConstraintTimer = setTimeout(() => {
                if (!this._map) return;
                const sizeChanged = this._containerSizeChanged();
                if (!sizeChanged) return;
                this._map.resize();
                this._applyMapConstraints({ recalcMinZoom: true });
                UIModule.syncMarkerDisplay();
            }, 200);
        });
    },

    /** イラスト用 source/layer（day/sunset/night）を取り除く */
    _removeIllustrationRasterStack() {
        if (!this._map) return;
        if (this._illustrationTimer) {
            clearInterval(this._illustrationTimer);
            this._illustrationTimer = null;
        }
        ['night', 'sunset', 'day'].forEach((key) => {
            const lid = `illustration-map-layer-${key}`;
            const sid = `illustration-map-${key}`;
            try {
                if (this._map.getLayer(lid)) this._map.removeLayer(lid);
                if (this._map.getSource(sid)) this._map.removeSource(sid);
            } catch (e) {
                console.warn('[MapModule] イラストレイヤ削除:', e);
            }
        });
    },

    /** イラスト image source のロード完了を待つ（再読込時の opacity レース回避） */
    _waitForIllustrationSources(keys, timeoutMs) {
        if (!this._map) return Promise.resolve();
        const limit = Number(timeoutMs);
        const ms = Number.isFinite(limit) && limit > 0 ? limit : 15000;
        return new Promise(resolve => {
            const pending = new Set(keys);
            let settled = false;
            const finish = () => {
                if (settled) return;
                settled = true;
                this._map.off('sourcedata', onSource);
                clearTimeout(tid);
                resolve();
            };
            const onSource = (e) => {
                if (!e.sourceId || !e.sourceId.startsWith('illustration-map-')) return;
                const key = e.sourceId.replace('illustration-map-', '');
                if (!pending.has(key)) return;
                try {
                    if (this._map.isSourceLoaded(e.sourceId)) pending.delete(key);
                } catch (err) {
                    console.warn('[MapModule] isSourceLoaded:', err);
                }
                if (pending.size === 0) finish();
            };
            keys.forEach(k => {
                const sid = `illustration-map-${k}`;
                try {
                    if (this._map.getSource(sid) && this._map.isSourceLoaded(sid)) pending.delete(k);
                } catch (err) { /* source 未追加 */ }
            });
            if (pending.size === 0) {
                resolve();
                return;
            }
            this._map.on('sourcedata', onSource);
            const tid = setTimeout(() => {
                if (pending.size > 0) {
                    console.warn('[MapModule] イラスト source 待ちタイムアウト', [...pending]);
                }
                finish();
            }, ms);
        });
    },

    /**
     * 3 枚スタック失敗時: 昼 1 枚のみ（日周り切替なし）
     * @returns {Promise<void>}
     */
    _addIllustrationMapDayFallback() {
        const cfg = CONFIG.MAP_IMAGE;
        const dayUrl = cfg.urlDay || cfg.url;
        const { coordinates, latOffset = 0, lngOffset = 0 } = cfg;
        const adjustedCoords = coordinates.map(([lng, lat]) => [lng + lngOffset, lat + latOffset]);

        this._removeIllustrationRasterStack();

        const insertDay = (finalUrl) => {
            if (this._map.getSource('illustration-map-day')) return Promise.resolve();
            this._map.addSource('illustration-map-day', {
                type:        'image',
                url:         finalUrl,
                coordinates: adjustedCoords
            });
            this._map.addLayer({
                id:      'illustration-map-layer-day',
                type:    'raster',
                source:  'illustration-map-day',
                paint:   { 'raster-opacity': 1, 'raster-fade-duration': 0 }
            });
            return this._waitForIllustrationSources(['day']);
        };

        if (location.protocol === 'file:') {
            return illustrationImageToBlobUrl(dayUrl).then((u) => insertDay(u));
        }
        return insertDay(illustrationUrlWithCacheBust(dayUrl));
    },

    /**
     * 昼・夕・夜の raster を積む。source ready 後にフェーズ切替を開始。
     * @returns {Promise<void>}
     */
    _addIllustrationMap() {
        const cfg = CONFIG.MAP_IMAGE;
        if (cfg.dayOnly || !cfg.urlSunset || !cfg.urlNight) {
            return this._addIllustrationMapDayFallback();
        }
        const dayUrl = cfg.urlDay || cfg.url;
        const sunsetUrl = cfg.urlSunset;
        const nightUrl = cfg.urlNight;
        const { coordinates, latOffset = 0, lngOffset = 0 } = cfg;
        const adjustedCoords = coordinates.map(([lng, lat]) => [lng + lngOffset, lat + latOffset]);

        this._removeIllustrationRasterStack();

        const phaseDefs = [
            { key: 'day', url: dayUrl },
            { key: 'sunset', url: sunsetUrl },
            { key: 'night', url: nightUrl }
        ];

        const insertStack = resolvedUrls =>
            new Promise((resolveIllust, rejectIllust) => {
                try {
                    const initialPhase = getIllustrationPhase(new Date(), cfg);
                    phaseDefs.forEach((p, i) => {
                        const rawUrl = Array.isArray(resolvedUrls) ? resolvedUrls[i] : p.url;
                        const finalUrl = Array.isArray(resolvedUrls)
                            ? rawUrl
                            : illustrationUrlWithCacheBust(rawUrl);
                        const opacity = p.key === initialPhase ? 1 : 0;
                        this._map.addSource(`illustration-map-${p.key}`, {
                            type:        'image',
                            url:         finalUrl,
                            coordinates: adjustedCoords
                        });
                        this._map.addLayer({
                            id:      `illustration-map-layer-${p.key}`,
                            type:    'raster',
                            source:  `illustration-map-${p.key}`,
                            paint:   { 'raster-opacity': opacity, 'raster-fade-duration': 0 }
                        });
                    });
                    this._waitForIllustrationSources(phaseDefs.map(p => p.key))
                        .then(() => {
                            this._scheduleIllustrationPhase();
                            resolveIllust();
                        })
                        .catch(rejectIllust);
                } catch (e) {
                    rejectIllust(e);
                }
            });

        if (location.protocol === 'file:') {
            return Promise.all(phaseDefs.map(p => illustrationImageToBlobUrl(p.url))).then(insertStack);
        }
        return insertStack(null);
    },

    _scheduleIllustrationPhase() {
        const apply = () => this._applyIllustrationTimePhase();
        apply();
        if (this._illustrationTimer) clearInterval(this._illustrationTimer);
        this._illustrationTimer = setInterval(apply, 45000);
        if (!this._illustrationVisibilityBound) {
            this._illustrationVisibilityBound = () => {
                if (document.visibilityState === 'visible') apply();
            };
            document.addEventListener('visibilitychange', this._illustrationVisibilityBound);
        }
    },

    _applyIllustrationTimePhase() {
        if (!this._map) return;
        const keys = ['day', 'sunset', 'night'];
        if (!keys.every(k => this._map.getLayer(`illustration-map-layer-${k}`))) return;
        if (!keys.every(k => {
            const sid = `illustration-map-${k}`;
            return this._map.getSource(sid) && this._map.isSourceLoaded(sid);
        })) return;
        const phase = getIllustrationPhase(new Date(), CONFIG.MAP_IMAGE);
        for (const key of keys) {
            this._map.setPaintProperty(`illustration-map-layer-${key}`, 'raster-opacity', key === phase ? 1 : 0);
        }
    },

    fitBounds() {
        const spotsVisible = LayerManager.getDefs().spots.visible;
        const targets = spotsVisible
            ? State.allSpots.filter(s => App._selectedCategories.has(App._effectiveFilterCategorySpot(s)))
            : [];
        const cam = this._cameraLock();

        if (targets.length > 0) {
            const bounds = new mapboxgl.LngLatBounds();
            targets.forEach(s => bounds.extend(s.coords));
            const padding = State.isPC
                ? { top: 80,  bottom: 80,  left: 50, right: 50 }
                : { top: 80, bottom: 260, left: 30, right: 30 };
            this._map.fitBounds(bounds, {
                padding,
                duration: 800,
                bearing:  cam.bearing,
                pitch:    cam.pitch
            });
        } else {
            this._applyInitView({ duration: 800 });
        }
    },

    flyTo(spot) {
        const c = spot?.coords;
        if (!Array.isArray(c) || c.length < 2
            || !Number.isFinite(Number(c[0])) || !Number.isFinite(Number(c[1]))) {
            console.warn('[MapModule] flyTo: skip (invalid coords)', spot?.id);
            return;
        }
        const padding = State.isPC
            ? { top: 50, bottom: 50, left: 50, right: 50 }
            : { top: 50, bottom: 240, left: 20, right: 20 };
        const flyZoom = Number(CONFIG.CLUSTER?.flyToZoom);
        const zoom = Number.isFinite(flyZoom) ? flyZoom : 17.5;
        const cam = this._cameraLock();
        this._map.flyTo({
            center: spot.coords,
            zoom,
            speed: 0.8,
            padding,
            bearing: cam.bearing,
            pitch:   cam.pitch,
            essential: true
        });
    },

    flyToUser() {
        if (State.userLocationMarker) {
            const flyZoom = Number(CONFIG.CLUSTER?.flyToZoom);
            const zoom = Number.isFinite(flyZoom) ? flyZoom : 17.5;
            const cam = this._cameraLock();
            this._map.flyTo({
                center: State.userLocationMarker.getLngLat(),
                zoom,
                bearing: cam.bearing,
                pitch:   cam.pitch
            });
        }
    },

    _startGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition(
            pos => {
                const coords = [pos.coords.longitude, pos.coords.latitude];
                if (!State.userLocationMarker) {
                    const el = document.createElement('div');
                    el.className = 'my-location-marker';
                    el.innerHTML = '<i class="fas fa-map-marker-alt"></i>';
                    State.userLocationMarker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
                        .setLngLat(coords).addTo(this._map);
                } else {
                    State.userLocationMarker.setLngLat(coords);
                }
            },
            err => console.log('[GPS]', err.message),
            { enableHighAccuracy: true }
        );
    }
};

// ================================================================
// UIModule — フィルター・レイヤーパネル・マーカー・カード・モーダル・ティッカー
// ================================================================
const UIModule = {
    _homeResetTimer: null,

    // ---- カテゴリフィルターパネル ----

    generateFilters(spots) {
        const list = document.getElementById('filter-list');
        list.innerHTML = '';
        const cats = App._allFilterCategoryKeys();

        // データに初めて現れたカテゴリは既定で表示ON（ユーザーが外した既存カテゴリはそのまま）
        App._mergeNewFilterCategories(cats);

        // カテゴリチェックボックス
        const catTitle = document.createElement('div');
        catTitle.className = 'ctrl-panel-title';
        catTitle.textContent = 'カテゴリ';
        list.appendChild(catTitle);

        const allLabel = document.createElement('label');
        allLabel.className = 'filter-item';
        allLabel.innerHTML = `<input type="checkbox" id="filter-all" checked
            onchange="App.toggleAll(this.checked)">
            <span class="checkmark"></span>
            <span class="cat-icon"><i class="fas fa-map"></i></span>
            <span style="font-weight:bold">${t('all')}</span>`;
        list.appendChild(allLabel);

        cats.forEach(cat => {
            const item = document.createElement('label');
            item.className = 'filter-item';
            const checked = App._selectedCategories.has(cat) ? 'checked' : '';
            item.innerHTML = `<input type="checkbox" data-cat="${cat}" ${checked}
                onchange="App.toggleCategory('${cat}', this.checked)">
                <span class="checkmark"></span>
                <span class="cat-icon"><i class="fas ${getCategoryIcon(cat)}"></i></span>
                <span>${cat}</span>`;
            list.appendChild(item);
        });

        // タグフィルター（データにタグがあれば表示）
        const allTags = [...new Set(
            spots.flatMap(s => (State.language === 'ja' ? s.tags : s.tags_en) || [])
        )].filter(Boolean).sort();

        if (allTags.length > 0) {
            const sep = document.createElement('div');
            sep.style.cssText = 'height:1px; background:#eee; margin: 8px 0 4px;';
            list.appendChild(sep);

            const tagTitle = document.createElement('div');
            tagTitle.className = 'ctrl-panel-title';
            tagTitle.textContent = t('tags');
            list.appendChild(tagTitle);

            const chipWrap = document.createElement('div');
            chipWrap.className = 'tag-filter-chips';
            allTags.forEach(tag => {
                const chip = document.createElement('span');
                chip.className = 'tag-filter-chip' + (State.selectedTags.has(tag) ? ' active' : '');
                chip.textContent = '#' + tag;
                chip.dataset.tag = tag;
                chip.onclick = () => App.toggleTagFilter(tag);
                chipWrap.appendChild(chip);
            });
            list.appendChild(chipWrap);
        }
    },

    // ---- レイヤーパネル ----

    renderLayerPanel() {
        const list = document.getElementById('layer-list');
        list.innerHTML = '';
        Object.entries(LayerManager.getDefs()).forEach(([id, def]) => {
            const name = State.language === 'ja' ? def.name : def.name_en;
            const item = document.createElement('div');
            item.className = 'layer-item';
            item.innerHTML = `
                <span class="layer-icon" style="background:${def.color}22; color:${def.color}">${def.icon}</span>
                <span class="layer-label">${name}</span>
                <label class="toggle-switch" onclick="event.stopPropagation()">
                    <input type="checkbox" ${def.visible ? 'checked' : ''}
                        onchange="LayerManager.toggle('${id}')">
                    <span class="toggle-track"></span>
                </label>`;
            list.appendChild(item);
        });
    },

    onTabTap(tabName) {
        if (State.isPC) {
            if (tabName === 'filter') this.togglePanel('filter-panel');
            else if (tabName === 'layer') this.togglePanel('layer-panel');
            else if (tabName === 'lang') App.toggleLanguage();
            return;
        }
        if (tabName === 'home') {
            this.resetHomeView();
        } else if (tabName === 'filter') {
            this.togglePanel('filter-panel');
            this._setActiveTab('tab-filter');
        } else if (tabName === 'layer') {
            this.togglePanel('layer-panel');
            this._setActiveTab('tab-layer');
        } else if (tabName === 'lang') {
            this.closePanelOverlay();
            App.toggleLanguage();
            this._setActiveTab('tab-lang');
            setTimeout(() => this._setActiveTab('tab-home'), 600);
        }
    },

    _setActiveTab(activeId) {
        document.querySelectorAll('#controls-container .ctrl-btn').forEach(btn => {
            btn.classList.toggle('tab-active', btn.id === activeId);
        });
    },

    togglePanel(id) {
        const target = document.getElementById(id);
        const isOpen = target.classList.contains('open');
        document.querySelectorAll('.ctrl-panel').forEach(p => p.classList.remove('open'));
        const overlay = document.getElementById('ctrl-panel-overlay');
        if (!isOpen) {
            target.classList.add('open');
            if (!State.isPC && overlay) overlay.classList.add('open');
        } else {
            if (overlay) overlay.classList.remove('open');
            if (!State.isPC) this._setActiveTab('tab-home');
        }
    },

    closePanelOverlay() {
        document.querySelectorAll('.ctrl-panel').forEach(p => p.classList.remove('open'));
        const overlay = document.getElementById('ctrl-panel-overlay');
        if (overlay) overlay.classList.remove('open');
        if (!State.isPC) this._setActiveTab('tab-home');
    },

    /** ホーム／マップアイコン: パネル閉じ＋選択解除＋初期ビューへ */
    resetHomeView() {
        if (this._homeResetTimer) clearTimeout(this._homeResetTimer);
        this._homeResetTimer = setTimeout(() => this._applyHomeViewReset(), 80);
    },

    _applyHomeViewReset() {
        this._homeResetTimer = null;
        if (!State.isPC) {
            this.closePanelOverlay();
            this._setActiveTab('tab-home');
        }
        State.currentSpot = null;
        document.querySelectorAll('.custom-marker').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.slide-card').forEach(c => c.classList.remove('active'));
        this.closeModal(null, true);
        this.closeKawaraModal(null, true);
        this.closeCoupon(null, true);

        if (!State.isPC) {
            const sheetWasCollapsed = document.body.classList.contains('cards-sheet-collapsed');
            this.expandCardsSheetIfCollapsed();
            const delay = sheetWasCollapsed ? 400 : 50;
            setTimeout(() => MapModule.resetView(), delay);
            return;
        }
        MapModule.resetView();
    },

    // サイドバーの折りたたみ／展開 (PC のみ有効)
    toggleSidebar() {
        document.body.classList.toggle('sidebar-collapsed');
        setTimeout(() => { if (MapModule._map) MapModule._map.resize(); }, 310);
    },

    /** モバイル: 下部カードシートの折りたたみ（PCでは無効） */
    toggleCardsSheet() {
        if (State.isPC) return;
        document.body.classList.toggle('cards-sheet-collapsed');
        const btn = document.getElementById('card-panel-handle');
        if (btn) {
            const collapsed = document.body.classList.contains('cards-sheet-collapsed');
            btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
            btn.setAttribute('aria-label', collapsed ? '店舗一覧を表示' : '店舗カードを隠す');
        }
        setTimeout(() => { if (MapModule._map) MapModule._map.resize(); }, 380);
    },

    expandCardsSheetIfCollapsed() {
        if (State.isPC) return;
        if (!document.body.classList.contains('cards-sheet-collapsed')) return;
        document.body.classList.remove('cards-sheet-collapsed');
        const btn = document.getElementById('card-panel-handle');
        if (btn) {
            btn.setAttribute('aria-expanded', 'true');
            btn.setAttribute('aria-label', '店舗カードを隠す');
        }
        setTimeout(() => { if (MapModule._map) MapModule._map.resize(); }, 380);
    },

    // ---- マーカー ----

    updateMarkers(spots) {
        State.filteredSpots = spots || [];
        this.syncMarkerDisplay();
    },

    /** ズームに応じてクラスタ（代表写真＋件数）／個別 HTML マーカーを切替 */
    syncMarkerDisplay() {
        const spots = State.filteredSpots || [];
        const spotsVisible = LayerManager.getDefs().spots.visible;
        const clusterView = ClusterModule.isEnabled() && ClusterModule.usesClusterView();

        if (!spotsVisible) {
            State.activeMarkers.forEach(m => { m.getElement().style.display = 'none'; });
            State.liveMarkers.forEach(m => { m.getElement().style.display = 'none'; });
            return;
        }

        State.activeMarkers.forEach(m => m.remove());
        State.liveMarkers.forEach(m => m.remove());
        State.activeMarkers = [];
        State.liveMarkers = [];

        if (clusterView) {
            ClusterModule.renderHtmlMarkers(spots, spotsVisible);
            if (State.activeMarkers.length === 0 && spots.length > 0) {
                console.warn('[UIModule] クラスタ描画が空のため個別ピンにフォールバック');
                spots.forEach(spot => this._appendSpotHtmlMarker(spot, spotsVisible));
            }
            return;
        }

        spots.forEach(spot => this._appendSpotHtmlMarker(spot, spotsVisible));

        if (CONFIG.ENABLE_STANDALONE_LIVE_PINS) {
            this._appendStandaloneLiveMarkers(spotsVisible);
        }

        if (State.currentSpot) {
            document.getElementById(`marker-${State.currentSpot.id}`)?.classList.add('active');
        }
    },

    /** クラスタ用 HTML マーカー（代表写真＋右上件数） */
    _appendClusterHtmlMarker(repSpot, count, coords, hasLivePost) {
        const si = getStatusInfo(val(repSpot, 'status'));
        const el = document.createElement('div');
        el.className = 'custom-marker custom-marker--cluster';
        el.setAttribute('role', 'button');
        el.setAttribute('aria-label', `${count}件のスポット`);

        const inner = document.createElement('div');
        inner.className = 'marker-inner floating';
        inner.style.borderColor = si.color;

        const clip = document.createElement('div');
        clip.className = 'marker-clip';

        const emoji = document.createElement('span');
        emoji.className = 'marker-emoji';
        emoji.innerText = repSpot.emoji;
        clip.appendChild(emoji);

        if (repSpot.imageUrl) {
            const img = new Image();
            img.src = repSpot.imageUrl;
            img.className = 'marker-image';
            img.alt = '';
            img.style.display = 'none';
            img.onload = () => { img.style.display = 'block'; emoji.style.display = 'none'; };
            clip.appendChild(img);
        }
        inner.appendChild(clip);
        el.appendChild(inner);

        if (hasLivePost) {
            const postBadge = document.createElement('div');
            postBadge.className = 'marker-post-badge';
            postBadge.innerHTML = '<i class="fas fa-newspaper" aria-hidden="true"></i>';
            postBadge.setAttribute('aria-label', '投稿あり');
            el.appendChild(postBadge);
        }

        const badge = document.createElement('div');
        badge.className = 'marker-cluster-badge';
        badge.textContent = String(count);
        el.appendChild(badge);

        el.addEventListener('click', e => {
            e.stopPropagation();
            ClusterModule.expandCluster(coords);
        });

        const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
            .setLngLat(coords).addTo(MapModule._map);
        State.activeMarkers.push(marker);
    },

    _appendSpotHtmlMarker(spot, spotsVisible) {
        const si = getStatusInfo(val(spot, 'status'));
        const el = document.createElement('div');
        el.className = 'custom-marker';
        el.id = `marker-${spot.id}`;
        if (!spotsVisible) el.style.display = 'none';

        const inner = document.createElement('div');
        inner.className = 'marker-inner floating';
        inner.style.borderColor = si.color;

        const clip = document.createElement('div');
        clip.className = 'marker-clip';

        const emoji = document.createElement('span');
        emoji.className = 'marker-emoji';
        emoji.innerText = spot.emoji;
        clip.appendChild(emoji);

        if (spot.imageUrl) {
            const img = new Image();
            img.src = spot.imageUrl;
            img.className = 'marker-image';
            img.style.display = 'none';
            img.onload = () => { img.style.display = 'block'; emoji.style.display = 'none'; };
            clip.appendChild(img);
        }
        inner.appendChild(clip);

        inner.classList.add('floating');
        el.appendChild(inner);

        if (spot.livePost) {
            const postBadge = document.createElement('div');
            postBadge.className = 'marker-post-badge';
            postBadge.innerHTML = '<i class="fas fa-newspaper" aria-hidden="true"></i>';
            postBadge.setAttribute('aria-label', '投稿あり');
            el.appendChild(postBadge);
        }

        el.addEventListener('click', e => { e.stopPropagation(); App.selectSpot(spot); });

        const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
            .setLngLat(spot.coords).addTo(MapModule._map);
        State.activeMarkers.push(marker);
    },

    /** 将来: 観光客 GPS 投稿などの独立ピン（CONFIG.ENABLE_STANDALONE_LIVE_PINS） */
    _appendStandaloneLiveMarkers(spotsVisible) {
        (State.liveStandalonePosts || []).forEach(lp => {
            if (!spotsVisible || lp.lat == null || lp.lng == null) return;
            if (!App._standaloneLiveVisible(lp)) return;
            const clr = LIVE_MARKER_COLOR_BY_ROLE[lp.role] || '#666';

            const el = document.createElement('div');
            el.className = 'live-standalone-marker custom-marker custom-marker--live-pin';
            const wrap = document.createElement('div');
            wrap.className = 'marker-inner-livepost';
            wrap.style.borderColor = clr;
            wrap.style.borderStyle = 'solid';

            if (lp.imageUrl) {
                const img = document.createElement('img');
                img.src = lp.imageUrl;
                img.alt = '';
                img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
                img.onerror = () => {
                    wrap.innerHTML = '<span style="font-size:20px;">📍</span>';
                };
                wrap.appendChild(img);
            } else {
                wrap.innerHTML = '<span style="font-size:22px;">📍</span>';
            }

            const pin = document.createElement('div');
            pin.className = 'marker-pin marker-pin--floating';

            const stem = document.createElement('div');
            stem.className = 'marker-pin-stem';
            stem.style.setProperty('--stem-color', clr);

            pin.appendChild(wrap);
            pin.appendChild(stem);

            const badge = document.createElement('div');
            badge.className = 'marker-post-badge';
            badge.style.background = clr;
            badge.innerHTML = '<i class="fas fa-newspaper" aria-hidden="true"></i>';
            badge.setAttribute('aria-label', '投稿あり');

            el.appendChild(badge);
            el.appendChild(pin);

            const titleShort = lp.title ? escapeHtml(lp.title) : '';
            const msgShort = lp.message ? escapeHtml(lp.message.substring(0, 80)) : '';
            const imgHtml = lp.imageUrl
                ? `<img src="${escapeHtml(lp.imageUrl)}" alt="" style="max-width:220px;border-radius:8px;margin-top:6px"/>`
                : '';
            const popupHtml = `<div style="max-width:240px;font-size:13px;line-height:1.4">
                ${titleShort ? `<div style="font-weight:bold;color:${clr}">${titleShort}</div>` : ''}
                <div style="font-size:11px;color:#888;margin-top:2px">${timeAgo(lp.timestamp)}</div>
                ${msgShort ? `<div style="margin-top:6px">${msgShort}</div>` : ''}
                ${imgHtml}
            </div>`;

            const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
                .setLngLat([Number(lp.lng), Number(lp.lat)])
                .setPopup(new mapboxgl.Popup({ offset: 28 }).setHTML(popupHtml))
                .addTo(MapModule._map);

            State.liveMarkers.push(marker);
        });
    },

    // ---- カードパネル ----

    renderCards(spots) {
        const container = document.getElementById('slide-panel');
        container.innerHTML = '';
        if (spots.length === 0) {
            container.innerHTML = `<div style="padding:20px; color:#555;">${t('noData')}</div>`;
            return;
        }
        spots.forEach(spot => {
            const card = document.createElement('div');
            card.className = 'slide-card';
            card.id = `card-${spot.id}`;
            card.onclick = () => App.selectSpot(spot);

            const thumbHtml = spot.imageUrl
                ? `<img src="${spot.imageUrl}" class="card-thumb"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                : '';
            const placeholder = `<div class="card-emoji-placeholder"
                style="${spot.imageUrl ? 'display:none' : ''}">${spot.emoji}</div>`;

            const indParts = [];
            if (spot.livePost) {
                indParts.push(`<span class="card-ind card-ind--post" title="投稿あり" aria-label="投稿あり"><i class="fas fa-newspaper" aria-hidden="true"></i></span>`);
            }
            const indicatorsHtml = indParts.length
                ? `<div class="card-image-indicators">${indParts.join('')}</div>`
                : '';

            const statusText = getSpotStatusText(spot);
            const statusHtml = statusText
                ? (() => {
                    const si = getStatusInfo(statusText);
                    return `<span class="card-status card-status--compact" style="background:${si.bg};color:${si.text}">${escapeHtml(statusText)}</span>`;
                  })()
                : '';

            const spotTags = (State.language === 'ja' ? spot.tags : spot.tags_en) || [];
            const tagsHtml = spotTags.length
                ? `<div class="tag-chips">${spotTags.slice(0, 3).map(tag =>
                    `<span class="tag-chip${State.selectedTags.has(tag) ? ' active' : ''}"
                        onclick="event.stopPropagation(); App.toggleTagFilter('${tag.replace(/'/g, '\\\'')}')">#${tag}</span>`
                  ).join('')}</div>`
                : '';

            let kawaraBtnHtml = '';
            if (spot.livePost) {
                kawaraBtnHtml = `<button type="button" class="btn-kawara" onclick="event.stopPropagation(); UIModule.openKawaraModal('${spot.id}')">
                    <i class="fas fa-newspaper" aria-hidden="true"></i> ${t('kawaraView')}
                </button>`;

            card.innerHTML = `
                <div class="card-image-area">${thumbHtml}${placeholder}${indicatorsHtml}</div>

                    <div class="card-arrow" role="button" aria-label="詳細">

                    </div>
                </div>`;

            if (arrowEl) {
                arrowEl.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    UIModule.openModal(spot.id);
                });
            }
            container.appendChild(card);
        });

    highlightCard(spot) {
        document.querySelectorAll('.slide-card').forEach(c => c.classList.remove('active'));
        const target = document.getElementById(`card-${spot.id}`);
        if (!target) return;
        target.classList.add('active');
        const container = document.getElementById('slide-panel');
        if (State.isPC) {
            container.scrollTo({ top: target.offsetTop - container.offsetTop, behavior: 'smooth' });
        } else {
            container.scrollTo({
                left: target.offsetLeft - (container.clientWidth / 2) + (target.offsetWidth / 2),
                behavior: 'smooth'
            });
        }
    },

    // ---- ニュースティッカー ----

    /**
     * ティッカーに表示するアイテムリストを構築して返す
     *
     * 優先順: LIVE投稿（新しい順）→ 通常news
     * 各要素:
     *   { type:'live'|'news', spot, text, imageUrl, timeStr }
     */
    _buildTickerList() {
        const liveItems = [];

        State.allSpots
            .filter(s => s.livePost)
            .filter(s => App._selectedCategories.has(
                s.livePost.category ? s.livePost.category : val(s, 'category')
            ))
            .forEach(spot => {
                const lp = spot.livePost;
                liveItems.push({
                    type:     'live',
                    spot,
                    text:     lp.message || '（画像投稿）',
                    imageUrl: lp.imageUrl || '',
                    timeStr:  timeAgo(lp.timestamp),
                    sortKey:  lp.timestamp.getTime()
                });
            });

        (State.liveStandalonePosts || [])
            .filter(lp => App._standaloneLiveVisible(lp))
            .forEach(lp => {
            liveItems.push({
                type:     'live_map',
                post:     lp,
                text:     lp.message || '（画像投稿）',
                imageUrl: lp.imageUrl || '',
                timeStr:  timeAgo(lp.timestamp),
                sortKey:  lp.timestamp.getTime()
            });
        });

        liveItems.sort((a, b) => (b.sortKey || 0) - (a.sortKey || 0));

        const newsItems = [];
        State.allSpots
            .filter(s => val(s, 'news'))
            .forEach(spot => {
                newsItems.push({
                    type:     'news',
                    spot,
                    text:     val(spot, 'news'),
                    imageUrl: '',
                    timeStr:  ''
                });
            });

        return liveItems.concat(newsItems);
    },

    startTicker() {
        // 外浦MAP: 中央上部ニュースリストは非表示（カード・ピンの LIVE 表示のみ）
        clearInterval(State.newsInterval);
        const wrapper = document.getElementById('news-ticker-wrapper');
        if (wrapper) wrapper.style.display = 'none';
    },

    _updateTickerText() {
        const list  = State.tickerList;
        if (!list || list.length === 0) return;
        const item  = list[State.currentNewsIndex];
        if (!item) return;

        const ticker   = document.getElementById('news-ticker');
        const iconArea = document.getElementById('ticker-icon-area');
        const thumb    = document.getElementById('ticker-live-thumb');
        const textEl   = document.getElementById('ticker-text');
        const spotEl   = document.getElementById('ticker-spot');
        const cntEl    = document.getElementById('ticker-counter');

        // フェードアウト
        textEl.style.opacity = spotEl.style.opacity = '0';

        setTimeout(() => {
            if (item.type === 'live' || item.type === 'live_map') {
                ticker.classList.add('live-mode');
                iconArea.innerHTML = '<span class="ticker-live-dot"></span>';

                if (item.imageUrl) {
                    thumb.src = item.imageUrl;
                    thumb.style.display = 'block';
                    thumb._liveUrl = item.imageUrl;
                    const brd = item.type === 'live_map'
                        ? (LIVE_MARKER_COLOR_BY_ROLE[item.post.role] || '#FF3B6B')
                        : '#2196F3';
                    thumb.style.borderColor = brd;
                } else {
                    thumb.style.display = 'none';
                }
                textEl.innerText = item.text;
                if (item.type === 'live') {
                    spotEl.innerHTML =
                        `<span style="color:#2196F3; font-weight:bold;">LIVE</span> @${val(item.spot, 'name')} · ${item.timeStr}`;
                } else {
                    const lp = item.post;
                    const c = LIVE_MARKER_COLOR_BY_ROLE[lp.role] || '#666';
                    spotEl.innerHTML =
                        `<span style="color:${c}; font-weight:bold;">LIVE</span> ${escapeHtml(lp.category || '')} · ${liveRoleJa(lp.role)} · ${item.timeStr}`;
                }

            } else {
                // 通常ニュースモード
                ticker.classList.remove('live-mode');
                iconArea.innerHTML = '<i class="fas fa-bullhorn"></i>';
                thumb.style.display = 'none';
                textEl.innerText = item.text;
                spotEl.innerText = `@${val(item.spot, 'name')}`;
            }

            cntEl.innerText = `${State.currentNewsIndex + 1}/${list.length}`;
            textEl.style.opacity = spotEl.style.opacity = '1';
        }, 280);
    },

        if (thumb?._liveUrl) this.openLightbox(thumb._liveUrl);

                const safeUrl = item.imageUrl ? item.imageUrl.replace(/'/g, '%27') : '';

                    ? `<img src="${item.imageUrl}" class="news-item-live-thumb"

                    ? `<img src="${item.imageUrl}" class="news-item-live-thumb"
                           style="border-color:${LIVE_MARKER_COLOR_BY_ROLE[lp.role] || '#666'}"
                           onclick="event.stopPropagation(); UIModule.openLightbox('${safeUrl}')"
                           onerror="this.style.display='none'">`
                    : `<div class="news-item-icon news-item-type-live"><i class="fas fa-circle" style="font-size:10px;"></i></div>`;
                const title = `${escapeHtml(lp.category || '')} · ${escapeHtml(liveRoleJa(lp.role))}`;
                div.innerHTML = `
                    ${thumbHtml}
                    <div style="flex:1; min-width:0;">
                        <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px;">
                            <span class="live-badge">● LIVE</span>
                            <span style="font-size:11px; font-weight:bold; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${title}</span>
                        </div>
                        <div style="font-size:13px; color:#444; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(item.text)}</div>
                        <div class="news-item-time">${item.timeStr}</div>
                    </div>`;
            } else {
                div.onclick = () => { App.selectSpot(item.spot); this.closeNewsList(null, true); };

                    <div class="news-item-icon"><i class="fas fa-bullhorn"></i></div>
                    <div style="flex:1; min-width:0;">
                        <div style="font-weight:bold; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(item.text)}</div>
                        <div style="font-size:12px; color:#888;">@${val(item.spot, 'name')}</div>

        document.getElementById('news-list-overlay').classList.add('open');
