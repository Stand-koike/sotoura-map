<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>神輿ルート追従 | 下田マップ</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XW0F1B5T6E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XW0F1B5T6E');
  </script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css" rel="stylesheet" />
  <script type="importmap">
  {
    "imports": {
      "@turf/turf": "https://esm.sh/@turf/turf@6.5.0"
    }
  }
  </script>
  <script src="../secrets.local.js" onerror="window.__SHIMODA_MAP_SECRETS__=window.__SHIMODA_MAP_SECRETS__||{MAPBOX_TOKEN:''}"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; }
    #mikoshi-map { position: absolute; inset: 0; bottom: 72px; }
    .toolbar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; flex-wrap: wrap;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0));
      background: rgba(255,255,255,0.97);
      border-top: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 -2px 12px rgba(0,60,100,0.08);
    }
    .toolbar button {
      min-height: 48px; min-width: 48px; padding: 10px 18px;
      border: none; border-radius: 12px;
      background: #0288d1; color: #fff; font-weight: bold; font-size: 15px;
      cursor: pointer; touch-action: manipulation;
    }
    .toolbar button:active { opacity: 0.9; transform: scale(0.98); }
    .toolbar button.secondary { background: #eceff1; color: #263238; }
    .status {
      width: 100%; text-align: center; font-size: 12px; color: #546e7a;
      padding: 0 8px; line-height: 1.4;
    }
    #mikoshi-error {
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 20;
      background: #ffebee; color: #b71c1c; padding: 12px 14px;
      border-radius: 10px; font-size: 14px; border: 1px solid #ffcdd2;
    }
  </style>
</head>
<body>
  <div id="mikoshi-error" hidden></div>
  <div id="mikoshi-map" role="application" aria-label="神輿ルート地図"></div>
  <div class="toolbar">
    <button type="button" id="btn-fit" class="secondary">全体表示</button>
    <button type="button" id="btn-icon-minus" class="secondary" title="アイコン小">−</button>
    <button type="button" id="btn-icon-plus" class="secondary" title="アイコン大">＋</button>
    <div class="status" id="lbl-phase">読み込み中…</div>
  </div>
  <script type="module" src="../js/mikoshi-app.js"></script>
</body>
</html>
